                            <input type="text" value={section} onChange={(e)=>setSection(e.target.value)}
                                className="w-full p-3 border border-gray-300 rounded focus:outline-none focus:border-gold focus:ring-1 focus:ring-gold transition-all bg-white bg-opacity-80"
                                placeholder="أدخل رقم الشعبة" />
                        </div>
                        {error && <p className="text-red-500 text-sm font-bold bg-red-50 p-2 rounded">{error}</p>}
                        <button type="submit" className="w-full bg-navy text-white py-3 rounded font-bold hover:bg-opacity-90 transition-all glow-effect">
                            دخول وبدء التعلم
                        </button>
                    </form>
                </div>
            );
        };

        // --- Screen 2: Topics Flow ---
        const TopicsFlow = ({ onFinish }) => {
            const [currentIndex, setCurrentIndex] = useState(0);
            const topic = ALL_DATA[currentIndex];
            
            // State for Formative Assessment
            const [ddAnswers, setDdAnswers] = useState({});
            const [matches, setMatches] = useState([]); // Array of {left, right}
            const [selectedLeft, setSelectedLeft] = useState(null);

            // Synchronous state reset and progression
            const handleNext = () => {
                setDdAnswers({});
                setMatches([]);
                setSelectedLeft(null);
                
                if (currentIndex < ALL_DATA.length - 1) {
                    setCurrentIndex(prev => prev + 1);
                } else {
                    onFinish();
                }
            };

            const isDropdownsCorrect = () => {
                const required = topic.exercises.dropdown.answers;
                for (const key in required) {
                    if (ddAnswers[key] !== required[key]) return false;
                }
                return Object.keys(required).length === Object.keys(ddAnswers).length;
            };

            const isMatchesCorrect = () => {
                return matches.length === topic.exercises.matching.length;
            };

            const canProceed = isDropdownsCorrect() && isMatchesCorrect();

            const renderHTML = (htmlString) => {
                return <div dangerouslySetInnerHTML={{ __html: htmlString }} className="text-lg" />;
            };

            return (
                <div className="fade-in space-y-8 pb-24">
                    <div className="flex justify-between items-center glass-panel p-4 shadow-sm">
                        <span className="font-bold text-navy text-lg">الوحدة {currentIndex + 1} من {ALL_DATA.length}</span>
                        <div className="flex space-x-2 space-x-reverse">
                            {ALL_DATA.map((_, idx) => (
                                <div key={idx} className={`w-4 h-4 rounded-full shadow-inner ${idx <= currentIndex ? 'bg-gold' : 'bg-gray-300'}`}></div>
                            ))}
                        </div>
                    </div>

                    <div className="glass-panel p-8">
                        {renderHTML(topic.content)}
                    </div>

                    <div className="glass-panel p-8 bg-trait1">
                        <h3 className="text-2xl font-bold text-navy mb-6 border-b-2 border-gold pb-2 w-max">الخريطة الذهنية</h3>
                        <div className="mindmap-grid" style={{ gridTemplateColumns: `repeat(auto-fit, minmax(280px, 1fr))` }}>
                            <div className="mm-node md:col-span-full mb-2">{topic.mindmap.main}</div>
                            {topic.mindmap.nodes.map((node, i) => (
                                <div key={i} className="mm-sub">{node}</div>
                            ))}
                        </div>
                    </div>

                    <div className="glass-panel p-8 bg-trait3">
                        <h3 className="text-2xl font-bold text-navy mb-6 border-b-2 border-gold pb-2 w-max">التقييم التكويني المشروط</h3>
                        
                        {/* Dropdown Exercise */}
                        <div className="mb-8 p-6 bg-white rounded-xl border border-blue-100 shadow-sm">
                            <h4 className="font-bold text-lg mb-4 text-primaryBlue">أكمل الفراغات بما يناسب:</h4>
                            <p className="leading-loose text-lg font-medium">
                                {topic.exercises.dropdown.text.split(/(\[Q\d\])/).map((part, i) => {
                                    if (part.startsWith('[Q')) {
                                        const qKey = part.replace(/[\[\]]/g, '');
                                        return (
                                            <select key={i} value={ddAnswers[qKey] || ""} onChange={(e) => setDdAnswers({...ddAnswers, [qKey]: e.target.value})}
                                                className={`mx-2 p-1 border-2 rounded-lg font-bold outline-none transition-colors ${ddAnswers[qKey] === topic.exercises.dropdown.answers[qKey] ? 'border-green-500 bg-green-50 text-green-700' : 'border-gray-300 bg-gray-50'}`}>
                                                <option value="" disabled>اختر...</option>
                                                {topic.exercises.dropdown.options[qKey].map((opt, j) => (
                                                    <option key={j} value={opt}>{opt}</option>
                                                ))}
                                            </select>
                                        );
                                    }
                                    return <span key={i}>{part}</span>;
                                })}
                            </p>
                        </div>

                        {/* Matching Exercise */}
                        <div className="p-6 bg-white rounded-xl border border-blue-100 shadow-sm">
                            <h4 className="font-bold text-lg mb-4 text-primaryBlue">صل بين القائمة (أ) وما يناسبها في (ب):</h4>
                            <div className="grid grid-cols-2 gap-8">
                                <div className="space-y-3">
                                    <h5 className="text-center font-bold mb-3 text-navy bg-gray-100 py-2 rounded">القائمة (أ)</h5>
                                    {topic.exercises.matching.map((m, i) => {
                                        const isMatched = matches.some(match => match.left === m.left);
                                        const isSelected = selectedLeft === m.left;
                                        return (
                                            <div key={i} 
                                                 onClick={() => !isMatched && setSelectedLeft(m.left)}
                                                 className={`p-3 rounded-lg border-2 cursor-pointer transition-all text-center font-bold ${isMatched ? 'border-green-500 bg-green-50 text-green-700' : isSelected ? 'border-navy bg-blue-50 text-navy' : 'border-gray-200 hover:border-gold hover:bg-yellow-50'}`}>
                                                {m.left}
                                            </div>
                                        )
                                    })}
                                </div>
                                <div className="space-y-3">
                                    <h5 className="text-center font-bold mb-3 text-navy bg-gray-100 py-2 rounded">القائمة (ب)</h5>
                                    {[...topic.exercises.matching].sort((a,b)=>a.right.localeCompare(b.right)).map((m, i) => {
                                        const isMatched = matches.some(match => match.right === m.right);
                                        return (
                                            <div key={i}
                                                 onClick={() => {
                                                    if(!selectedLeft || isMatched) return;
                                                    const correctMatch = topic.exercises.matching.find(x => x.left === selectedLeft);
                                                    if(correctMatch && correctMatch.right === m.right) {
                                                        setMatches([...matches, {left: selectedLeft, right: m.right}]);
                                                        setSelectedLeft(null);
                                                    } else {
                                                        setSelectedLeft(null);
                                                    }
                                                 }}
                                                 className={`p-3 rounded-lg border-2 cursor-pointer transition-all text-center font-bold ${isMatched ? 'border-green-500 bg-green-50 text-green-700' : 'border-gray-200 hover:border-gold hover:bg-yellow-50'}`}>
                                                {m.right}
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        </div>

                    </div>

                    {/* Navigation Button */}
                    <div className="fixed bottom-0 left-0 w-full bg-white p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.1)] flex justify-center fade-in z-50 border-t-4 border-green-500">
                        {canProceed ? (
                            <button onClick={handleNext} className="bg-green-600 text-white px-12 py-3 rounded-full font-bold text-xl hover:bg-green-700 transition-all glow-effect flex items-center shadow-lg">
                                {currentIndex < ALL_DATA.length - 1 ? 'الانتقال للوحدة التالية' : 'الانتقال للمراجعة الذكية'}
                                <span className="mr-3 text-2xl font-normal">←</span>
                            </button>
                        ) : (
                            <p className="text-gray-500 font-bold flex items-center"><span className="text-red-500 mr-2 text-xl">⚠️</span> يرجى الإجابة بشكل صحيح على الأسئلة أعلاه لتفعيل زر الانتقال.</p>
                        )}
                    </div>
                </div>
            );
        };

        // --- Screen 3: Smart Review ---
        const SmartReview = ({ onFinish }) => {
            const [openAcc, setOpenAcc] = useState(null);

            return (
                <div className="fade-in space-y-10 pb-10">
                    <div className="text-center mb-10 glass-panel p-6 border-b-4 border-gold">
                        <h2 className="text-3xl font-bold font-amiri text-navy mb-2">المراجعة الذكية المزدوجة</h2>
                        <p className="text-gray-600 text-lg">اقلب البطاقات لحفظ المصطلحات، وافتح القوائم للفهم التحليلي الشامل للمقرر</p>
                    </div>

                    <h3 className="text-2xl font-bold text-navy border-r-4 border-gold pr-3">أولاً: بطاقات المفاهيم والأحكام (14 بطاقة)</h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                        {FLASHCARDS.map((card, i) => (
                            <div key={i} className="flip-card">
                                <div className="flip-card-inner">
                                    <div className="flip-card-front">{card.front}</div>
                                    <div className="flip-card-back">{card.back}</div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <h3 className="text-2xl font-bold text-navy border-r-4 border-gold pr-3 mt-12">ثانياً: التحليل المقالي والفهم العميق (10 أسئلة)</h3>
                    <div className="space-y-4">
                        {ACCORDIONS.map((acc, i) => (
                            <div key={i} className="glass-panel overflow-hidden border border-gray-200">
                                <button onClick={() => setOpenAcc(openAcc === i ? null : i)} className="w-full text-right p-5 font-bold text-navy bg-white hover:bg-blue-50 flex justify-between items-center transition-colors">
                                    <span className="text-lg flex items-center">
                                        <span className={`ml-3 text-2xl ${ICON_COLORS[i % ICON_COLORS.length]}`}>❖</span>
                                        {acc.q}
                                    </span>
                                    <span className={`text-2xl transition-transform duration-300 ${openAcc === i ? 'rotate-45 text-red-500' : 'text-gold'}`}>+</span>
                                </button>
                                <div className={`px-5 transition-all duration-300 ease-in-out ${openAcc === i ? 'max-h-96 py-5 border-t border-gray-100 bg-trait2' : 'max-h-0 py-0 bg-white'}`}>
                                    <p className="leading-loose text-gray-800 text-lg">{acc.a}</p>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="text-center mt-12 pt-8">
                        <button onClick={onFinish} className="bg-navy text-white px-12 py-4 rounded-full font-bold text-xl hover:bg-opacity-90 transition-all glow-effect shadow-xl">
                            بدء التقييم الشامل
                        </button>
                    </div>
                </div>
            );
        };

        // --- Screen 4: Quiz ---
        const Quiz = ({ onFinish }) => {
            const [answers, setAnswers] = useState({});
            const [submitted, setSubmitted] = useState(false);

            const isComplete = Object.keys(answers).length === QUIZ_QUESTIONS.length;

            const handleSubmit = () => {
                let s = 0;
                QUIZ_QUESTIONS.forEach((q, i) => {
                    if (answers[i] === q.correct) s++;
                });
                setSubmitted(true);
                setTimeout(() => onFinish(s), 2500);
            };

            return (
                <div className="fade-in max-w-4xl mx-auto pb-20">
                    <div className="text-center mb-10 glass-panel p-6 border-b-4 border-navy">
                        <h2 className="text-4xl font-bold font-amiri text-navy">التقييم الشامل</h2>
                        <p className="text-gray-600 mt-3 text-lg font-bold">أجب عن جميع الأسئلة التالية ({QUIZ_QUESTIONS.length} سؤال)</p>
                    </div>

                    <div className="space-y-6">
                        {QUIZ_QUESTIONS.map((q, i) => {
                            const iconColorClass = ICON_COLORS[i % ICON_COLORS.length];
                            return (
                                <div key={i} className={`glass-panel p-6 transition-all ${submitted ? (answers[i] === q.correct ? 'border-2 border-green-500 bg-green-50' : 'border-2 border-red-500 bg-red-50') : 'hover:border-gold border-2 border-transparent'}`}>
                                    <h3 className="font-bold text-xl mb-5 text-navy flex items-start">
                                        <span className={`ml-3 text-2xl font-black ${iconColorClass}`}>{i+1}.</span> 
                                        {q.q}
                                    </h3>
                                    <div className="space-y-3">
                                        {q.options.map((opt, j) => (
                                            <label key={j} className={`block p-4 rounded-lg border-2 cursor-pointer transition-all ${answers[i] === j ? 'bg-navy text-white border-navy shadow-md transform scale-[1.01]' : 'bg-white hover:bg-gray-50 border-gray-200'} ${submitted && j === q.correct ? 'bg-green-500 text-white border-green-500 shadow-md' : ''} ${submitted && answers[i] === j && j !== q.correct ? 'bg-red-500 text-white border-red-500' : ''}`}>
                                                <input type="radio" name={`q${i}`} className="hidden" 
                                                    checked={answers[i] === j} 
                                                    onChange={() => !submitted && setAnswers({...answers, [i]: j})} />
                                                <span className="text-lg font-medium">{opt}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    <div className="mt-12 text-center sticky bottom-6 z-50">
                        <button onClick={handleSubmit} disabled={!isComplete || submitted} 
                            className={`px-12 py-4 rounded-full font-bold text-xl shadow-2xl transition-all ${isComplete && !submitted ? 'bg-gold text-navy hover:bg-yellow-500 glow-effect transform hover:-translate-y-1' : 'bg-gray-300 text-gray-500 cursor-not-allowed border-2 border-gray-400'}`}>
                            {submitted ? 'جاري حساب النتيجة وإرسالها...' : 'إنهاء وإرسال النتيجة'}
                        </button>
                    </div>
                </div>
            );
        };

        // --- Screen 5: Result & Silent Submission ---
        const ResultScreen = ({ userInfo, score }) => {
            const [status, setStatus] = useState('جاري إرسال النتيجة صمتاً...');

            useEffect(() => {
                const duration = Math.round((new Date() - userInfo.startTime) / 60000); 
                const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSeAtWpsGVdYNm6qt88dhkrd_Kj2kiyWBQiejpNjLvBfsOkPzw/formResponse";
                
                const formData = new FormData();
                formData.append('entry.631676590', "المحاضرة الثامنة");
                formData.append('entry.716230744', userInfo.name);
                formData.append('entry.258825401', userInfo.section);
                formData.append('entry.1926766466', score);
                formData.append('entry.585619026', duration);

                fetch(formUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                })
                .then(() => {
                    setStatus('تم حفظ النتيجة وتوثيق إنجازك بنجاح ✔️');
                })
                .catch(() => {
                    setStatus('تم الانتهاء.');
                });
            }, []);

            return (
                <div className="max-w-lg mx-auto glass-panel p-12 text-center fade-in mt-10 border-t-8 border-navy shadow-2xl">
                    <h2 className="text-4xl font-bold font-amiri text-navy mb-8">نتيجة التقييم الشامل</h2>
                    <div className="text-6xl font-black text-gold mb-8 border-4 border-navy w-48 h-48 mx-auto flex items-center justify-center rounded-full bg-white shadow-[0_0_30px_rgba(226,185,111,0.5)]">
                        {score} / 20
                    </div>
                    <div className="space-y-4 mb-10 text-xl font-bold bg-gray-50 p-6 rounded-xl border border-gray-200">
                        <p className="text-navy flex justify-between"><span>الاسم:</span> <span>{userInfo.name}</span></p>
                        <p className="text-navy flex justify-between border-t border-gray-200 pt-3"><span>الشعبة:</span> <span>{userInfo.section}</span></p>
                    </div>
                    <p className="text-green-600 font-bold mb-8 text-lg">{status}</p>
                    <button onClick={() => window.location.reload()} className="px-10 py-4 bg-navy text-white rounded-full font-bold hover:bg-opacity-90 transition-all glow-effect shadow-lg w-full">
                        العودة للرئيسية
                    </button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
