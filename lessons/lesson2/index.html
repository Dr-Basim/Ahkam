<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحاضرة الثانية - الشرح الكامل (النسخة المعتمدة)</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#16213e', gold: '#e2b96f', cream: '#faf8f3',
                        trait1: '#f0fdf4', trait2: '#eff6ff', trait3: '#fdf2f8', trait4: '#fffbeb',
                        trait5: '#f5f3ff', trait6: '#fdf4ff', trait7: '#ecfeff', trait8: '#fef2f2',
                    },
                    fontFamily: { amiri: ['Amiri', 'serif'], tajawal: ['Tajawal', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #faf8f3; color: #16213e; scroll-behavior: smooth; }
        .verse { 
            font-family: 'Amiri', serif; background: white; border-right: 8px solid #e2b96f; 
            padding: 2rem; margin: 1.5rem 0; font-size: 1.7rem; line-height: 2.3; 
            border-radius: 0 1.5rem 1.5rem 0; box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
        }
        .hl-red { color: #b91c1c; border-bottom: 3px solid #ef4444; font-weight: 800; }
        .hl-blue { color: #1d4ed8; border-bottom: 3px solid #3b82f6; font-weight: 800; }
        .hl-emerald { color: #047857; border-bottom: 3px solid #10b981; font-weight: 800; }
        .hl-gold { color: #b45309; border-bottom: 3px solid #e2b96f; font-weight: 800; }
        .hl-mark { background-color: #fef08a; padding: 2px 5px; border-radius: 5px; font-weight: 700; }
        
        .nav-btn { transition: all 0.3s; border-bottom: 4px solid transparent; white-space: nowrap; }
        .nav-btn.active { border-bottom-color: #e2b96f; color: #e2b96f; background: rgba(255,255,255,0.1); }
        
        .flip-card { perspective: 1000px; height: 260px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card:hover .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 1.5rem; border-radius: 2rem; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
        .flip-card-back { transform: rotateY(180deg); background: #16213e; color: #e2b96f; border: 2px solid #e2b96f; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { height: 5px; }
        ::-webkit-scrollbar-thumb { background: #e2b96f; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSeAtWpsGVdYNm6qt88dhkrd_Kj2kiyWBQiejpNjLvBfsOkPzw/formResponse";
        const ENTRIES = { name: "entry.716230744", section: "entry.258825401", score: "entry.1926766466", time: "entry.585619026" };

        const App = () => {
            const [screen, setScreen] = useState('welcome');
            const [activeTab, setActiveTab] = useState('intro');
            const [user, setUser] = useState({ name: '', section: '', start: 0 });
            const [score, setScore] = useState(0);
            const [duration, setDuration] = useState(0);

            // --- 1. Welcome Screen ---
            const Welcome = () => {
                const [n, setN] = useState('');
                const [s, setS] = useState('');
                const isValid = n.trim().split(/\s+/).length >= 4 && s !== '';
                return (
                    <div className="min-h-screen bg-primary flex items-center justify-center p-6 text-right">
                        <div className="bg-white p-12 rounded-[3.5rem] shadow-2xl max-w-xl w-full border-t-[15px] border-gold fade-in">
                            <h1 className="font-amiri text-5xl font-black text-primary text-center mb-4">المحاضرة الثانية</h1>
                            <p className="text-center text-gray-500 mb-10 font-bold">شرح بلوغ المرام للشيخ ابن عثيمين</p>
                            <div className="space-y-6">
                                <input type="text" placeholder="الاسم الرباعي للطالب" className="w-full p-5 rounded-2xl bg-gray-50 border-2 border-gray-100 outline-none focus:border-gold text-lg" onChange={e=>setN(e.target.value)} />
                                <input type="text" placeholder="رقم الشعبة" className="w-full p-5 rounded-2xl bg-gray-50 border-2 border-gray-100 outline-none focus:border-gold text-lg" onChange={e=>setS(e.target.value)} />
                                <button disabled={!isValid} onClick={()=>{setUser({name:n,section:s,start:Date.now()});setScreen('main');}} className={`w-full py-6 rounded-2xl font-black text-2xl shadow-xl transition-all ${isValid ? 'bg-primary text-gold' : 'bg-gray-300 text-white cursor-not-allowed'}`}>دخول المحاضرة التعليمية</button>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- 2. Main Tabbed Content ---
            const MainContent = () => {
                const tabs = [
                    { id: 'intro', label: 'أهمية الطهارة' },
                    { id: 'h1', label: 'الحديث الأول (ماء البحر)' },
                    { id: 'h18', label: 'الحديث الثاني (الآنية)' },
                    { id: 'h30', label: 'الحديث الثالث (النجاسة)' },
                    { id: 'h37', label: 'الحديث الرابع (الوضوء)' },
                    { id: 'map', label: 'الخريطة الذهنية' },
                    { id: 'review', label: 'المراجعة الذكية' },
                    { id: 'exam', label: 'الاختبار النهائي' }
                ];

                return (
                    <div className="min-h-screen bg-cream pb-20">
                        <nav className="sticky top-0 z-50 bg-primary text-white border-b-4 border-gold shadow-2xl overflow-x-auto no-scrollbar">
                            <div className="max-w-7xl mx-auto flex">
                                {tabs.map(tab => (
                                    <button 
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`nav-btn px-6 py-5 font-bold text-sm md:text-base flex-1 ${activeTab === tab.id ? 'active' : 'opacity-70 hover:opacity-100'}`}
                                    >
                                        {tab.label}
                                    </button>
                                ))}
                            </div>
                        </nav>

                        <div className="max-w-6xl mx-auto p-6 md:p-12 fade-in">
                            {/* --- القسم 1: أهمية الطهارة --- */}
                            {activeTab === 'intro' && (
                                <div className="space-y-8">
                                    <h2 className="font-amiri text-5xl font-black text-primary border-r-8 border-gold pr-6">كتاب الطهارة: المقدمة والتقاسيم</h2>
                                    <div className="bg-trait1 p-10 rounded-[3rem] text-2xl leading-[2.5] shadow-sm border border-black/5 space-y-8">
                                        <p>بسم الله الرحمن الرحيم. بدأ العلماء رحمهم الله الذين تكلموا في الفقه كتبهم بالحديث عن <span className="hl-gold">الطهارة</span>؛ وذلك لأن الطهارة هي مفتاح الصلاة، والصلاة هي أهم أركان الإسلام العملية بعد الشهادتين.</p>
                                        <div className="grid md:grid-cols-2 gap-10 mt-10">
                                            <div className="bg-white p-10 rounded-3xl border-r-8 border-emerald-500 shadow-md">
                                                <h4 className="font-black text-emerald-700 text-3xl mb-6">١. طهارة القلب (المعنوية)</h4>
                                                <p className="text-xl">وهي طهارة معنوية، ومعناها أن يطهر الإنسان قلبه من <span className="hl-emerald">الشِّرْكِ</span> كله، صغيره وكبيره، ظاهره وخفيه. ويطهره كذلك من إرادة البدع كلها، ومن الغل والحقد على المؤمنين، والحسد وكراهة ما يسر المؤمن. <span className="hl-mark">وهذا هو الأهم</span>؛ لأنها هي الأصل، وبها تُقبل الأعمال.</p>
                                            </div>
                                            <div className="bg-white p-10 rounded-3xl border-r-8 border-blue-500 shadow-md">
                                                <h4 className="font-black text-blue-700 text-3xl mb-6">٢. طهارة البدن (الظاهرية)</h4>
                                                <p className="text-xl">ويقصد بها شيئان: <span className="hl-blue">الطهارة من الأحداث</span>، وهذه لا تكون إلا بالماء. و<span className="hl-blue">الطهارة من الأنجاس</span> والأقذار كالأبوال والغائط، وهذه تكون بالماء وبغيره من كل ما يزيل النجاسة كالبنزين والمنظفات.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* --- القسم 2: الحديث الأول (ماء البحر) --- */}
                            {activeTab === 'h1' && (
                                <div className="space-y-8">
                                    <h2 className="font-amiri text-5xl font-black text-primary border-r-8 border-gold pr-6">١- باب المياه: الحديث الأول</h2>
                                    <div className="bg-trait2 p-10 rounded-[3rem] text-2xl leading-[2.5] shadow-sm border border-black/5 space-y-8">
                                        <div className="verse text-center font-bold">١ - عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللهِ ﷺ فِي الْبَحْرِ: «هُوَ الطَّهُورُ مَاؤُهُ، الْحِلُّ مَيْتَتُهُ».</div>
                                        <p><span className="hl-blue">طهورية ماء البحر:</span> قوله ﷺ: «الطَّهُورُ مَاؤُهُ» بالفتح هو الماء الذي يُتطهر به. وهذا عام في كل بحر عظيم، سواء كان مالحاً أو مراً، وسواء كان في مستنقعات أرض السباخ أو الغدران التي تجتمع فيها الأمطار. فالقاعدة هي: <span className="hl-mark">كل ماء نزل من السماء أو نبع من الأرض فهو طهور</span>.</p>
                                        <p><span className="hl-gold">حكمة ملوحة البحر:</span> جعل الله مياه البحار العظيمة مالحة لئلا تفسد بموت الحيوانات فيها، فلو كانت مياهاً عذبة وماتت فيها الحيوانات لنتنت الرياح وهلك الناس، فجعلها الله مالحة لكي تذيب كل شيء وتطهره وتجعله لا يتغير ريحه.</p>
                                        <p><span className="hl-emerald">حل ميتة البحر:</span> أجاب النبي ﷺ السائلين بأكثر مما سألوا؛ لأنهم سألوه عن الوضوء فبين لهم الوضوء وبين لهم حل الميتة. وفسر ابن عباس رضي الله عنهما صيد البحر وطعامه في القرآن بأن <span className="hl-mark">الصيد ما أخذ حياً</span> و <span className="hl-mark">الطعام ما أخذ ميتاً</span>.</p>
                                    </div>
                                </div>
                            )}

                            {/* --- القسم 3: الحديث الثاني (الآنية) --- */}
                            {activeTab === 'h18' && (
                                <div className="space-y-8">
                                    <h2 className="font-amiri text-5xl font-black text-primary border-r-8 border-gold pr-6">٢- باب الآنية: الحديث الثامن عشر</h2>
                                    <div className="bg-trait4 p-10 rounded-[3rem] text-2xl leading-[2.5] shadow-sm border border-black/5 space-y-8">
                                        <div className="verse text-center font-bold">١٨ - عَنْ حُذَيْفَةَ بْنِ الْيَمَانِ رَضِيَ اللهُ عَنْهُمَا قَالَ: قَالَ النَّبِيُّ ﷺ: «لَا تَشْرَبُوا فِي آنِيَةِ الذَّهَبِ وَالْفِضَّةِ، وَلَا تَأْكُلُوا فِي صِحَافِهَا، فَإِنَّهَا لَهُمْ فِي الدُّنْيَا، وَلَكُمْ فِي الآخِرَةِ».</div>
                                        <p><span className="hl-blue">العلاقة بين المياه والآنية:</span> ذكر المؤلف باب الآنية بعد باب المياه لأن الماء جوهر سيال لا يمكن حفظه أو استعماله إلا بوعاء أو إناء يحويه.</p>
                                        <p><span className="hl-emerald">الأصل في الأواني:</span> الإباحة والحل من أي مادة كانت (خشب، حديد، بلاستيك، زجاج، فخار) لقوله تعالى: ﴿هُوَ الَّذِي خَلَقَ لَكُمْ مَا فِي الأَرْضِ جَمِيعًا﴾. المحرم فقط هو الذهب والفضة.</p>
                                        <p><span className="hl-red">تحريم الذهب والفضة:</span> الأكل والشرب في آنية الذهب والفضة من <span className="hl-mark">كبائر الذنوب</span>؛ للوعيد الشديد الوارد فيه بأن من يشرب في الفضة كأنما «يجرجر في بطنه نار جهنم»، والجرجرة هي صوت انحدار الماء في الحلق.</p>
                                        <p><span className="hl-gold">الأواني المطلية:</span> التحريم يشمل الأواني المطلية بالذهب والفضة أيضاً. وعلة التحريم أن هذه الآنية عُجلت للكفار في الدنيا كبراً وخيلاء، وذُخرت للمؤمنين في الآخرة.</p>
                                    </div>
                                </div>
                            )}

                            {/* --- القسم 4: الحديث الثالث (النجاسة) --- */}
                            {activeTab === 'h30' && (
                                <div className="space-y-8">
                                    <h2 className="font-amiri text-5xl font-black text-primary border-r-8 border-gold pr-6">٣- باب إزالة النجاسة: الحديث الثلاثون</h2>
                                    <div className="bg-trait6 p-10 rounded-[3rem] text-2xl leading-[2.5] shadow-sm border border-black/5 space-y-8">
                                        <div className="verse text-center font-bold">٣٠ - عَنْ عَائِشَةَ رَضِيَ اللهُ عَنْهَا قَالَتْ: «كَانَ رَسُولُ اللهِ ﷺ يَغْسِلُ الْمَنِيَّ... وَفِي رِوَايَةٍ: لَقَدْ كُنْتُ أَفْرُكُهُ مِنْ ثَوْبِ رَسُولِ اللهِ ﷺ فَرْكًا فَيُصَلِّي فِيهِ».</div>
                                        <p><span className="hl-emerald">حكم المني:</span> طاهر لأنه أصل خلق الإنسان المكرم، ولكن يغسل رطباً ويفرك يابساً تجميلاً للمنظر ودفعاً للاستقذار.</p>
                                        <div className="bg-white p-8 rounded-[2.5rem] shadow-md border-r-8 border-primary space-y-6">
                                            <h4 className="font-black text-2xl underline decoration-gold">أنواع الخارج من الإنسان وأحكامها:</h4>
                                            <ul className="space-y-6 text-xl">
                                                <li>١- <span className="hl-red">البول والودي:</span> نجس ويجب غسله (الودي ماء أبيض يخرج غالباً عقب البول).</li>
                                                <li>٢- <span className="hl-blue">المذي:</span> ماء رقيق يخرج عقب الشهوة بلا إحساس، وهو نجس يوجب الوضوء وغسل العضو وما أصاب الثوب.</li>
                                                <li>٣- <span className="hl-emerald">المني:</span> ماء غليظ يخرج دفقاً بشهوة، وهو طاهر ويوجب الغسل الكامل للبدن.</li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* --- القسم 5: الحديث الرابع (الوضوء - التفصيل الكامل) --- */}
                            {activeTab === 'h37' && (
                                <div className="space-y-8">
                                    <h2 className="font-amiri text-5xl font-black text-primary border-r-8 border-gold pr-6">٤- صفة الوضوء: الحديث السابع والثلاثون</h2>
                                    <div className="bg-trait5 p-10 rounded-[3rem] text-2xl leading-[2.5] shadow-sm border border-black/5 space-y-8">
                                        <div className="verse text-center font-bold">٣٧ - عَنْ حُمْرَانَ أَنَّ عُثْمَانَ رَضِيَ اللهُ عَنْهُ دَعَا بِوَضُوءٍ، فَغَسَلَ كَفَّيْهِ ثَلَاثَ مَرَّاتٍ، ثُمَّ تَمَضْمَضَ، وَاسْتَنْشَقَ، وَاسْتَنْثَرَ، ثُمَّ غَسَلَ وَجْهَهُ ثَلَاثَ مَرَّاتٍ، ثُمَّ غَسَلَ يَدَهُ الْيُمْنَى إِلَى الْمِرْفَقِ ثَلَاثَ مَرَّاتٍ، ثُمَّ الْيُسْرَى مِثْلَ ذَلِكَ...</div>
                                        <p>أراد عثمان رضي الله عنه تعليم الناس <span className="hl-blue">بالفعل</span> لأنه أبلغ في التعلم. الفرق بين <span className="hl-gold">الوَضوء</span> (الماء) و <span className="hl-gold">الوُضوء</span> (الفعل).</p>
                                        
                                        <div className="grid md:grid-cols-2 gap-10 mt-10">
                                            <div className="bg-white p-10 rounded-[2.5rem] border-r-8 border-blue-600 shadow-md space-y-4">
                                                <h4 className="font-black text-2xl text-blue-800 underline">حدود الوجه:</h4>
                                                <p className="text-xl">طولاً: من منابت شعر الرأس المعتاد إلى منتهى اللحيين (الذقن).<br/>عرضاً: من الأذن إلى الأذن.</p>
                                            </div>
                                            <div className="bg-white p-10 rounded-[2.5rem] border-r-8 border-emerald-600 shadow-md space-y-4">
                                                <h4 className="font-black text-2xl text-emerald-800 underline">اليدين إلى المرفقين:</h4>
                                                <p className="text-xl">يغسل من أطراف الأصابع إلى المرفقين، <span className="hl-mark">ويجب إدخال المرفقين في الغسل</span>؛ لأن كلمة (إلى) تعني هنا (مع).</p>
                                            </div>
                                            <div className="bg-white p-10 rounded-[2.5rem] border-r-8 border-gold shadow-md space-y-4">
                                                <h4 className="font-black text-2xl text-amber-800 underline">الرأس والأذنان:</h4>
                                                <p className="text-xl">يمسح الرأس من مقدمه إلى قفاه ثم يعود. والأذنان من الرأس فيمسحهما معه؛ بإدخال سباحتيه في صماخيه ومسح الإبهام بظاهرهما.</p>
                                            </div>
                                            <div className="bg-white p-10 rounded-[2.5rem] border-r-8 border-purple-600 shadow-md space-y-4">
                                                <h4 className="font-black text-2xl text-purple-800 underline">الرجلين إلى الكعبين:</h4>
                                                <p className="text-xl">يغسل من أطراف الأصابع مع <span className="hl-mark">إدخال الكعبين في الغسل وجوباً</span>؛ كما فعل عثمان رضي الله عنه.</p>
                                            </div>
                                        </div>

                                        <div className="bg-white p-10 rounded-[3rem] border-r-8 border-primary shadow-sm space-y-6">
                                            <h4 className="font-black text-2xl text-primary underline">من فوائد هذا الحديث:</h4>
                                            <ul className="list-decimal pr-10 space-y-4 text-xl">
                                                <li>الاستنجاء يسبق الوضوء إذا وجد سبب (بول أو غائط)، ولا دخل له في أعضاء الوضوء الأربعة.</li>
                                                <li>غسل الكفين ثلاثاً في أول الوضوء سنة.</li>
                                                <li>المضمضة والاستنشاق والاستنثار جزء واجب من غسل الوجه.</li>
                                                <li>التثليث في الغسل (ثلاث مرات) والبدء باليمين.</li>
                                                <li>هذا هو الوضوء الكامل الذي كان النبي ﷺ يفعله.</li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* --- القسم 6: الخريطة الذهنية (مستطيلة) --- */}
                            {activeTab === 'map' && (
                                <div className="space-y-12 py-10">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10 max-w-5xl mx-auto">
                                        {[
                                            { t: "أهمية الطهارة", i: "🕋", d: ["طهارة القلب (المعنوية)", "طهارة البدن (الحدث والنجاسة)"] },
                                            { t: "باب المياه", i: "💧", d: ["ماء البحر طهور مطهر", "ميتة البحر حلال بكل أنواعها"] },
                                            { t: "باب الآنية", i: "🏺", d: ["الأصل الإباحة والحل", "تحريم الذهب والفضة والطلاء"] },
                                            { t: "إزالة النجاسة", i: "✨", d: ["المني طاهر ويوجب الغسل", "المذي نجس يوجب الوضوء"] },
                                            { t: "صفة الوضوء", i: "🌊", d: ["حدود الوجه واليدين والكعبين", "التعليم بالفعل والتطبيق"] }
                                        ].map((n, idx) => (
                                            <div key={idx} className="bg-primary p-10 rounded-[2.5rem] text-white shadow-2xl border-b-8 border-gold transition-all hover:scale-105">
                                                <div className="flex items-center gap-6 mb-6">
                                                    <span className="text-6xl">{n.i}</span>
                                                    <h4 className="text-gold font-bold text-3xl font-amiri underline decoration-white/20">{n.t}</h4>
                                                </div>
                                                <ul className="pr-8 border-r-2 border-gold/40 space-y-4 text-xl">
                                                    {n.d.map((li, i) => <li key={i}>• {li}</li>)}
                                                </ul>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* --- القسم 7: المراجعة الذكية --- */}
                            {activeTab === 'review' && (
                                <div className="space-y-20">
                                    <div>
                                        <h3 className="text-3xl font-black mb-12 border-r-8 border-gold pr-6">بطاقات الذاكرة التفاعلية</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
                                            {[
                                                { q: "حد الوجه طولاً", a: "من منابت شعر الرأس إلى الذقن" },
                                                { q: "حد الوجه عرضاً", a: "من الأذن إلى الأذن" },
                                                { q: "المرفقان والكعبان", a: "يجب إدخالهما في الغسل وجوباً" },
                                                { q: "الوَضوء بالفتح", a: "الماء الذي يتطهر به" },
                                                { q: "الوُضوء بالضم", a: "فعل المتوضئ وتطبيقه للعبادة" },
                                                { q: "المني", a: "طاهر ويوجب الغسل الكامل" },
                                                { q: "المذي", a: "نجس يوجب الوضوء وغسل المحل" },
                                                { q: "طعام البحر", a: "ما أخذ منه ميتاً وهو حلال" },
                                                { q: "صيد البحر", a: "ما أخذ منه حياً وهو حلال" },
                                                { q: "الجرجرة", a: "صوت انحدار الماء في الحلق كصوت النار" },
                                                { q: "الودي", a: "ماء نجس يخرج غالباً عقب البول" },
                                                { q: "طهارة القلب", a: "تطهير القلب من الشرك والبدع والغل" }
                                            ].map((f, i) => (
                                                <div key={i} className="flip-card">
                                                    <div className="flip-card-inner">
                                                        <div className={`bg-trait${(i%8)+1} flip-card-front font-bold text-xl`}>{f.q}</div>
                                                        <div className="flip-card-back text-lg leading-relaxed">{f.a}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <h3 className="text-3xl font-black mb-12 border-r-8 border-gold pr-6">الأسئلة التحليلية الشاملة</h3>
                                        <div className="space-y-8 max-w-5xl mx-auto">
                                            {[
                                                { q: "لماذا بدأ الفقهاء كتبهم بباب الطهارة؟ وما علاقة الإناء بها؟", a: "بدؤوا بالطهارة لأنها مفتاح الصلاة، وذكروا الآنية لأن الماء جوهر سيال لا يمكن حفظه أو استعماله إلا بوعاء يحويه." },
                                                { q: "وضح الفرق بين طهارة الحدث وطهارة النجاسة من حيث المادة؟", a: "طهارة الحدث لا تكون إلا بالماء بنص القرآن، أما طهارة النجاسة فتزول بالماء وبكل مادة مزيلة كالبنزين والمنظفات." },
                                                { q: "لماذا جعل الله مياه البحار العظيمة مالحة وليست عذبة؟", a: "لحكمة بالغة؛ لئلا تفسد بموت الحيوانات وتنتن الرياح ويهلك البشر، فملوحتها تذيب الأنتان وتحفظ المياه." },
                                                { q: "ما هو الوعيد الوارد فيمن يشرب في آنية الفضة؟ وما معنى الجرجرة؟", a: "الوعيد أنه يجرجر في بطنه نار جهنم، والجرجرة هي صوت انحدار الماء في الحلق كصوت النار." },
                                                { q: "اشرح الفرق بين المني والمذي والودي من حيث الحكم والصفة؟", a: "المني (طاهر/يوجب غسل)، المذي (نجس/يوجب وضوء وغسل العضو)، الودي (نجس/يخرج بعد البول وحكمه كالبول)." },
                                                { q: "ما الحكمة من تعليم الصحابة للناس الوضوء بالفعل كما فعل عثمان؟", a: "لأن التعليم بالفعل أرسخ في الذهن، وأسرع في التعلم، وأدق في نقل صفة العبادة كما فعلها النبي ﷺ." },
                                                { q: "هل يشمل تحريم الأكل والشرب في آنية الذهب الأواني المطلية؟", a: "نعم يشملها، لأن الظاهر أنها ذهب وفضة، والشارع حرم الهيئة والمنظر الذي فيه كبرياء وعيد." },
                                                { q: "كيف فسر ابن عباس رضي الله عنهما 'صيد البحر' و 'طعام البحر'؟", a: "فسر الصيد بما أخذ حياً، والطعام بما أخذ ميتاً، وكلاهما حلال بنص الآية والحديث." },
                                                { q: "ما هي الطهارة المعنوية وكيف تتحقق؟ ولماذا هي الأهم؟", a: "هي طهارة القلب من الشرك والحسد، وتتحقق باتباع الكتاب والسنة، وهي الأهم لأنها أصل قبول الأعمال." },
                                                { q: "صف كيف يمسح المتوضئ رأسه وأذنيه بدقة كما ذكر في المحاضرة؟", a: "يمسح الرأس من مقدمه إلى القفا ثم يعود، ثم يدخل سباحتيه في صماخي أذنيه ويمسح بإبهاميه ظاهرهما." }
                                            ].map((e, i) => (
                                                <details key={i} className={`group bg-trait${(i%8)+1} rounded-[3rem] p-10 shadow-lg border border-black/5 transition-all`}>
                                                    <summary className="font-bold text-3xl text-primary cursor-pointer list-none flex justify-between items-center outline-none">
                                                        <span>{e.q}</span>
                                                        <span className="text-gold text-4xl group-open:rotate-180 transition-transform">▼</span>
                                                    </summary>
                                                    <div className="mt-10 text-gray-800 text-2xl leading-relaxed p-8 bg-white/60 rounded-3xl border-t-2 border-gold/20">{e.a}</div>
                                                </details>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="flex justify-center">
                                        <button onClick={()=>setActiveTab('exam')} className="bg-primary text-gold px-24 py-8 rounded-full text-4xl font-black shadow-2xl">بدء الاختبار النهائي</button>
                                    </div>
                                </div>
                            )}

                            {/* --- القسم 8: الاختبار النهائي --- */}
                            {activeTab === 'exam' && <Assessment />}
                        </div>
                    </div>
                );
            };

            const Assessment = () => {
                const qs = [
                    { q: "أي أنواع الطهارة هو الأهم لصلاح الإنسان وقبول عمله؟", o: ["طهارة البدن", "طهارة الثوب", "طهارة القلب من الشرك والغل", "طهارة المكان"], c: 2 },
                    { q: "حد الوجه طولاً في الوضوء من منابت شعر الرأس المعتاد إلى:", o: ["الأنف", "الفم", "منتهى اللحيين والذقن", "الرقبة"], c: 2 },
                    { q: "حد الوجه عرضاً في الوضوء يكون حصراً من:", o: ["العين للعين", "الأذن للأذن", "الفك للفك", "الصدغ للصدغ"], c: 1 },
                    { q: "عند غسل اليدين في الوضوء، المرفقان يكونان:", o: ["خارج الغسل", "داخل الغسل وجوباً", "سنة فقط", "يمسحان فقط"], c: 1 },
                    { q: "غسل الكفين في أول الوضوء (حديث عثمان) يعتبر:", o: ["ركن واجب", "سنة مستحبة", "محرم", "لا يشرع"], c: 1 },
                    { q: "حد غسل الرجلين يكون مع إدخال:", o: ["الأصابع فقط", "باطن القدم", "الكعبين وجوباً", "الساق"], c: 2 },
                    { q: "الماء الذي يُتطهر به (بفتح الواو) يسمى لغةً:", o: ["وُضوء", "وَضوء", "طُهور", "غُسل"], c: 1 },
                    { q: "حكم ماء البحر المالح جداً أو المستنقعات في السباخ:", o: ["نجس", "طهور مطهر", "طاهر لا يطهر", "مكروه"], c: 1 },
                    { q: "الحكمة من ملوحة البحار هي لئلا يفسد الماء بـ:", o: ["أشعة الشمس", "موت الكائنات فيه", "السفن", "الملح الكثير"], c: 1 },
                    { q: "ميتة البحر بجميع أنواعها تعتبر:", o: ["محرمة", "نجسة", "حلال", "مكروهة"], c: 2 },
                    { q: "الأصل في الأواني (غير الذهب والفضة):", o: ["التحريم", "الإباحة والحل المطلق", "الكراهة", "الوجوب"], c: 1 },
                    { q: "الأكل في آنية الذهب والفضة يُعد من:", o: ["المباحات", "صغائر الذنوب", "كبائر الذنوب", "المكروهات"], c: 2 },
                    { q: "الجرجرة هي صوت انحدار الماء في الحلق كصوت النار وتسمى:", o: ["جرجرة", "صلصلة", "قعقعة", "همهمة"], c: 0 },
                    { q: "المني في حكم الطهارة يُعتبر:", o: ["نجساً", "طاهراً (أصل الإنسان)", "مشتبهاً فيه", "مبطلاً للصلاة فقط"], c: 1 },
                    { q: "المذي ماء رقيق يخرج عقب الشهوة وحكمه:", o: ["طاهر", "نجس يوجب الوضوء وغسل المحل", "نجس يوجب الغسل الكامل", "لا حكم له"], c: 1 },
                    { q: "الماء الأبيض الذي يخرج غالباً عقب البول يسمى:", o: ["مني", "مذي", "ودي", "طهر"], c: 2 },
                    { q: "المضمضة والاستنشاق في الوضوء الصحيح:", o: ["خارج غسل الوجه", "جزء واجب من غسل الوجه", "سنة مستقلة", "لا تجب"], c: 1 },
                    { q: "طهارة الحدث بنص القرآن لا تكون إلا بـ:", o: ["التراب", "المنظفات", "الماء", "البنزين"], c: 2 },
                    { q: "مسح الرأس في الوضوء الكامل يكون:", o: ["ثلاث مرات", "مرة واحدة ذهاباً وإياباً", "مرتان", "لا يمسح"], c: 1 },
                    { q: "الأذنان في الوضوء حكمهما أنهما:", o: ["من الوجه", "عضواً مستقلاً", "من الرأس فيمسحان معه", "لا تطهر"], c: 2 }
                ];

                const [curr, setCurr] = useState(0);
                const [ans, setAns] = useState([]);

                const next = (i) => {
                    const n = [...ans, i]; setAns(n);
                    if (curr < 19) setCurr(curr + 1);
                    else {
                        const s = n.reduce((acc, a, idx) => a === qs[idx].c ? acc + 5 : acc, 0);
                        setScore(s); setDuration(Math.floor((Date.now() - user.start) / 60000)); setScreen('result');
                    }
                };

                return (
                    <div className="bg-white rounded-[4rem] shadow-2xl overflow-hidden border-4 border-gold fade-in text-right">
                        <div className="bg-primary p-12 text-white flex justify-between items-center">
                            <h3 className="text-3xl font-black">السؤال {curr+1} من ٢٠</h3>
                            <div className="text-gold font-bold text-3xl">{Math.round(((curr+1)/20)*100)}%</div>
                        </div>
                        <div className="p-16">
                            <h4 className="text-4xl font-bold text-primary mb-12 leading-tight">{qs[curr].q}</h4>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                {qs[curr].o.map((o, i) => (
                                    <button key={i} onClick={()=>next(i)} className="p-10 rounded-[2.5rem] border-2 border-gray-100 text-right hover:border-gold hover:bg-gold/5 transition-all text-2xl font-black shadow-sm active:scale-95">{o}</button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            const ResultScreen = () => {
                const [sent, setSent] = useState(false);
                const submit = async () => {
                    const url = `${FORM_URL}?usp=pp_url&${ENTRIES.name}=${encodeURIComponent(user.name)}&${ENTRIES.section}=${encodeURIComponent(user.section)}&${ENTRIES.score}=${score}&${ENTRIES.time}=${duration}`;
                    try { await fetch(url, { mode: 'no-cors' }); setSent(true); } catch(e) { alert('خطأ في الإرسال'); }
                };
                return (
                    <div className="min-h-screen bg-primary flex items-center justify-center p-6 text-center">
                        <div className="bg-white rounded-[5rem] p-24 max-w-2xl w-full shadow-2xl border-t-[15px] border-gold">
                            <h2 className="text-6xl font-black text-primary mb-10">النتيجة النهائية</h2>
                            <div className="text-gold text-[12rem] font-black leading-none mb-10">{score}%</div>
                            <div className="text-3xl space-y-6 mb-16 text-gray-600">
                                <p>الطالب: <span className="text-primary font-bold">{user.name}</span></p>
                                <p>الشعبة: <span className="text-primary font-bold">{user.section}</span></p>
                                <p>الوقت: <span className="text-primary font-bold">{duration} دقيقة</span></p>
                            </div>
                            {!sent ? (
                                <button onClick={submit} className="w-full py-10 bg-primary text-gold rounded-[3rem] font-black text-4xl shadow-xl hover:scale-105 transition-all">إرسال النتيجة للأستاذ</button>
                            ) : (
                                <div className="bg-green-100 text-green-700 p-12 rounded-[3.5rem] font-black text-5xl animate-bounce">تم حفظ النتيجة بنجاح ✅</div>
                            )}
                        </div>
                    </div>
                );
            };

            return (
                <div>
                    {screen === 'welcome' && <Welcome />}
                    {screen === 'main' && <MainContent />}
                    {screen === 'result' && <ResultScreen />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
