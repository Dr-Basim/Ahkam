        // 1. شجرة التفرع الأفقي (للمواضيع المتعددة الأقسام)
        const renderTree = (rootText, childrenArray) => {
            const numChildren = childrenArray.length;
            const lineWidth = numChildren > 1 ? `${((numChildren - 1) / numChildren) * 100}%` : '0%';

            return (
                <div className="flex flex-col items-center mt-6 w-full max-w-4xl mx-auto">

                        {rootText}
                    </div>
                    
                    {/* الجذع */}
                    <div className="w-1.5 h-8 bg-gold"></div>
                    
                    {/* الخط الأفقي الواصل بين الفروع */}
                    {numChildren > 1 && (
                        <div className="w-full relative flex justify-center">
                            <div className="absolute top-0 h-1.5 bg-gold" style={{ width: lineWidth }}></div>
                        </div>
                    )}
                    
                    {/* الفروع مع الأسهم */}
                    <div className={`flex justify-around w-full relative z-0 mt-0 gap-2 md:gap-6`}>
                        {childrenArray.map((child, i) => (

                                    {child}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

                            </div>

            { q: "ما هو الشرط الأساسي الذي يجب توفره في بيع السلعة المشتراة؟ وما الدليل؟", a: "الشرط أن يحوزها المشتري ويقبضها قبضاً تاماً قبل أن يبيعها. الدليل: قوله ﷺ (من ابتاع طعاماً فلا يبعه حتى يقبضه)." },
            { q: "اذكر اثنين من أهم شروط صحة بيع التقسيط.", a: "1. أن تكون السلعة بحوزة البائع وتحت تصرفه أثناء العقد. 2. عدم اشتراط غرامة مالية على المشتري إذا تأخر في سداد الأقساط (لأنه ربا)." },
            { q: "ما المقصود بربا النسيئة؟ واذكر مثالاً مبسطاً عليه.", a: "النسيئة هو الزيادة مقابل تأخير الدفع (الأجل). مثاله: بيع ألف صاع قمح بألف ومائتي صاع تدفع بعد سنة، أو اقتراض مال بفائدة متزايدة مع الزمن." },
            { q: "ما حكم اقتراض مبلغ من البنك المالي مع اشتراط البنك أخذ فائدة محددة عند السداد؟ ولماذا؟", a: "هذا الفعل ربا محرم صريح باتفاق الفقهاء، وذلك تطبيقاً للقاعدة الشرعية القاطعة: (كل قرض جرّ منفعة فهو ربا)." }
        ];

        const QUIZ_QUESTIONS = [
            { q: "حكم البيع والشراء لمن تلزمه صلاة الجمعة بعد الأذان الثاني:", options: ["مكروه", "مباح", "محرم ولا يصح", "مستحب"], answer: 2 },
            { q: "أن يقول شخص لمن اشترى شيئاً: أنا أبيعك مثله بأرخص منه، هذا يسمى:", options: ["الشراء على الشراء", "بيع المسلم على بيع أخيه", "النجش", "بيع العينة"], answer: 1 },
            { q: "أن يبيع شخص سلعة لآخر بثمن إلى أجل، ثم يشتريها منه نقداً بثمن أقل، يسمى:", options: ["بيع التقسيط", "المرابحة", "بيع العينة", "الإقالة"], answer: 2 },
            { q: "حكم بيع العينة:", options: ["جائز", "محرم لأنه حيلة للربا", "مكروه", "مباح للحاجة"], answer: 1 },
            { q: "حكم بيع السلعة المشتراة قبل قبضها وحيازتها التامة:", options: ["يجوز مطلقاً", "يجوز في الطعام فقط", "لا يجوز حتى يقبضها", "يجوز إن كان الثمن نقداً"], answer: 2 },
            { q: "يعرف بدو صلاح ثمار النخيل بـ:", options: ["اكتمال نموها وزيادة حجمها", "احمرارها أو اصفرارها", "قطفها ووضعها في الصناديق", "تساقط بعضها على الأرض"], answer: 1 },
            { q: "أن يزيد شخص في ثمن السلعة المعروضة ولا يريد شراءها بل ليغر غيره، يسمى:", options: ["المرابحة", "النجش", "العينة", "بيع المكره"], answer: 1 },
            { q: "رفع العقد الذي وقع بين المتعاقدين وفسخه برضاهما من غير زيادة ولا نقص:", options: ["الإقالة", "الربا", "القرض", "النجش"], answer: 0 },
            { q: "بيع السلعة بثمنها المعلوم بين المتعاقدين بربح معلوم ومحدد بينهما:", options: ["بيع التقسيط", "عقد المرابحة", "بيع العينة", "الإقالة"], answer: 1 },
            { q: "من شروط بيع التقسيط الصحيحة:", options: ["إلزام المشتري بغرامة تأخير", "أن يشتري البائع السلعة بعد الاتفاق", "أن تكون السلعة بحوزة البائع عند العقد", "احتفاظ البائع بملكية المبيع بعد البيع كلياً"], answer: 2 },
            { q: "الربا لغة يعني:", options: ["النقص والخسارة", "الزيادة والنمو", "المبادلة والمقايضة", "الأجل والتأخير"], answer: 1 },
            { q: "عقوبة آكل الربا يوم القيامة كما نص القرآن الكريم:", options: ["يعمى بصره", "لا يقوم إلا كقيام المصروع", "يحشر مع فرعون", "لا يدخل الجنة أبداً"], answer: 1 },
            { q: "الأشياء الستة التي حرم فيها ربا الفضل هي: الذهب، الفضة، البر، الشعير، التمر، و...", options: ["الأرز", "الزبيب", "الملح", "الذرة"], answer: 2 },
            { q: "علة الربا في البر والشعير والتمر والملح عند الفقهاء هي:", options: ["الطعم والمذاق", "الاقتيات والادخار", "الكيل والوزن", "اللون والشكل"], answer: 2 },
            { q: "الزيادة في أحد العوضين مقابل تأخير الدفع في بيع جنسين اتفقا في علة ربا الفضل، يسمى:", options: ["ربا الفضل", "ربا النسيئة", "بيع العينة", "القرض الحسن"], answer: 1 },
            { q: "إذا بيع ذهب بذهب، يشترط في هذا العقد:", options: ["التقابض في المجلس فقط", "التساوي في الوزن فقط", "التقابض في المجلس والتساوي معاً", "لا يشترط شيء لكونه حراً"], answer: 2 },
            { q: "إذا بيع بر بشعير (اختلف الجنس واتحدت العلة)، يشترط:", options: ["التقابض والتساوي", "التقابض قبل التفرق فقط ويجوز التفاضل", "التساوي فقط", "يجوز التأجيل والتفاضل معاً"], answer: 1 },
            { q: "باع مائة درهم فضة بعشرة جنيهات ذهب، على أن يدفعها بعد سنة. ما الحكم الفقهي؟", options: ["يجوز مطلقاً", "لا يجوز لعدم التساوي", "لا يجوز لعدم التقابض يداً بيد في المجلس", "مكروه تنزيهاً"], answer: 2 },
            { q: "قاعدة القرض المحرم التي أجمع عليها الفقهاء هي: كل قرض جرّ ...", options: ["خسارة", "منفعة مشروطة", "تأخيراً ومماطلة", "خصومة وعداوة"], answer: 1 },
            { q: "إذا رد المقترض للمقرض زيادة مالية دون شرط مسبق أو قصد:", options: ["يحرم ذلك ويأثم", "صح ذلك وهو يعتبر من تبرع وحسن القضاء", "يجب إرجاع الزيادة للمقترض فوراً", "يفسد عقد القرض الأساسي"], answer: 1 }
        ];

        // --- المكونات (Components) ---
        
        const SVGIcons = {
            Book: () => <svg className="w-6 h-6 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>,
            Map: () => <svg className="w-6 h-6 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>,
            Cards: () => <svg className="w-6 h-6 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>,
            Quiz: () => <svg className="w-6 h-6 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>,
            Check: () => <svg className="w-5 h-5 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
        };

        const WelcomeScreen = ({ onStart }) => {
            const [name, setName] = useState('');
            const [section, setSection] = useState('');
            const [error, setError] = useState('');

            const handleStart = () => {
                const nameParts = name.trim().split(/\s+/);
                if (nameParts.length < 3) {
                    setError('عذراً، يجب إدخال الاسم الثلاثي على الأقل.');
                    return;
                }
                if (!section.trim()) {
                    setError('عذراً، يجب إدخال رقم الشعبة.');
                    return;
                }
                onStart(name, section);
            };

            return (
                <div className="flex-grow flex items-center justify-center p-4 animate-fade-in bg-[url('https://www.transparenttextures.com/patterns/arabesque.png')]">
                    <div className="glass-panel p-10 rounded-3xl max-w-xl w-full text-center relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-gold opacity-20 rounded-bl-full"></div>
                        <h1 className="text-4xl font-amiri font-bold text-navy mb-2 relative z-10">فقه المعاملات</h1>
                        <h2 className="text-2xl text-gold mb-8 border-b border-gray-200 pb-4 inline-block relative z-10">الدرس الثاني: البيوع المحرمة والقرض</h2>
                        <div className="space-y-6 relative z-10">
                            <div>
                                <input type="text" value={name} onChange={(e) => {setName(e.target.value); setError('');}} placeholder="أدخل اسمك الكامل هنا..." className="w-full p-4 rounded-xl border-2 border-gray-200 focus:border-gold focus:outline-none transition-colors text-center" />
                            </div>
                            <div>
                                <input type="text" value={section} onChange={(e) => {setSection(e.target.value); setError('');}} placeholder="رقم الشعبة (مثال: YM2)" className="w-full p-4 rounded-xl border-2 border-gray-200 focus:border-gold focus:outline-none transition-colors text-center" />
                            </div>
                            {error && <p className="text-red-500 font-bold animate-pulse">{error}</p>}
                            <button onClick={handleStart} className="w-full bg-navy text-white font-bold text-xl py-4 rounded-xl mt-4 hover:bg-gold hover:text-navy transition-colors duration-300 shadow-lg transform hover:scale-105">ابدأ رحلة التعلم</button>
                        </div>
                    </div>
                </div>
            );
        };

        // Activity Component: Cloze Test (Fill in the blanks)
        const FillBlankActivity = ({ activity, onPass }) => {
            const [answers, setAnswers] = useState({});
            const [isCorrect, setIsCorrect] = useState(false);

            useEffect(() => {
                const allCorrect = activity.blanks.every(b => answers[b.id] === b.correct);
                setIsCorrect(allCorrect);
                if(allCorrect) onPass();
            }, [answers]);

            return (
                <div className="bg-white p-6 rounded-2xl border-2 border-emerald-500/30 shadow-md">
                    <h4 className="font-bold text-navy mb-4 flex items-center gap-2">
                        <svg className="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        {activity.question}
                    </h4>
                    <p className="text-xl leading-loose font-tajawal">
                        {activity.textParts.map((part, idx) => (
                            <React.Fragment key={idx}>
                                {part}
                                {idx < activity.blanks.length && (
                                    <select 
                                        className={`mx-2 p-1 px-4 rounded border-2 font-bold focus:outline-none transition-colors cursor-pointer
                                            ${answers[idx] === activity.blanks[idx].correct ? 'border-emerald-500 bg-emerald-50 text-emerald-700' : 'border-gray-300 bg-gray-50'}`}
                                        onChange={(e) => setAnswers(prev => ({...prev, [idx]: e.target.value}))}
                                        value={answers[idx] || ""}
                                    >
                                        <option value="" disabled>-- اختر --</option>
                                        {activity.blanks[idx].options.sort().map((opt, i) => (
                                            <option key={i} value={opt}>{opt}</option>
                                        ))}
                                    </select>
                                )}
                            </React.Fragment>
                        ))}
                    </p>
                    {isCorrect && <div className="mt-4 text-emerald-600 font-bold animate-pulse flex items-center gap-2"><SVGIcons.Check/> أحسنت! إجابة صحيحة. يمكنك الاستمرار.</div>}
                </div>
            );
        };

        // Activity Component: Matching (Dropdown definition select)
        const MatchingActivity = ({ activity, onPass }) => {
            const [answers, setAnswers] = useState({});
            const [isCorrect, setIsCorrect] = useState(false);
            const [options] = useState([...activity.pairs.map(p => p.def)].sort(() => Math.random() - 0.5));

            useEffect(() => {
                const allCorrect = activity.pairs.every((p, idx) => answers[idx] === p.def);
                setIsCorrect(allCorrect);
                if(allCorrect) onPass();
            }, [answers]);

            return (
                <div className="bg-white p-6 rounded-2xl border-2 border-emerald-500/30 shadow-md">
                    <h4 className="font-bold text-navy mb-4 flex items-center gap-2">
                        <svg className="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        {activity.question}
                    </h4>
                    <div className="space-y-4">
                        {activity.pairs.map((pair, idx) => (
                            <div key={idx} className="flex flex-col md:flex-row items-center gap-4 bg-gray-50 p-3 rounded-xl border border-gray-200">
                                <div className="w-full md:w-1/3 font-bold text-navy text-lg">{pair.term}</div>
                                <div className="w-full md:w-2/3">
                                    <select 
                                        className={`w-full p-3 rounded border-2 font-tajawal focus:outline-none text-sm md:text-base cursor-pointer
                                            ${answers[idx] === pair.def ? 'border-emerald-500 bg-emerald-50 text-emerald-800 font-bold' : 'border-gray-300'}`}
                                        onChange={(e) => setAnswers(prev => ({...prev, [idx]: e.target.value}))}
                                        value={answers[idx] || ""}
                                    >
                                        <option value="" disabled>-- اختر التعريف أو الحكم المطابق --</option>
                                        {options.map((opt, i) => (
                                            <option key={i} value={opt}>{opt}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>
                        ))}
                    </div>
                    {isCorrect && <div className="mt-4 text-emerald-600 font-bold animate-pulse flex items-center gap-2"><SVGIcons.Check/> عمل رائع! الإجابات متطابقة تماماً.</div>}
                </div>
            );
        };

        const StepperContentScreen = ({ onComplete }) => {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [activityPassed, setActivityPassed] = useState(false);
            const topRef = useRef(null);

            const topic = TOPICS_DATA[currentIndex];
            const isLast = currentIndex === TOPICS_DATA.length - 1;

            const handleNext = (e) => {
                e.preventDefault();
                if (isLast) {
                    onComplete(); 
                } else {
                    setCurrentIndex(prev => prev + 1);
                    setActivityPassed(false);
                    if (topRef.current) topRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            };

            const jumpToPrevious = (idx) => {
                if (idx < currentIndex) {
                    setCurrentIndex(idx);
                    setActivityPassed(false); 
                    if (topRef.current) topRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }

            return (
                <div className="animate-fade-in pb-24 w-full max-w-5xl mx-auto mt-6 px-4" ref={topRef}>
                    
                    {/* Progress Bar - القابل للتمرير الأفقي */}
                    <div className="mb-8 glass-panel p-4 rounded-2xl flex items-center gap-4 overflow-x-auto hide-scrollbar scroll-smooth">
                        {TOPICS_DATA.map((t, idx) => (
                            <div key={t.id} 
                                 className="min-w-[50px] md:min-w-[65px] flex-shrink-0 flex flex-col items-center gap-2"
                                 onClick={() => jumpToPrevious(idx)}
                                 style={{ cursor: idx < currentIndex ? 'pointer' : 'default' }}
                                 title={idx < currentIndex ? 'انقر للعودة لهذه المحطة' : ''}>
                                <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm transition-all duration-500
                                    ${idx < currentIndex ? 'bg-emerald-500 text-white hover:scale-110 shadow-md' : idx === currentIndex ? 'bg-gold text-navy shadow-lg ring-4 ring-gold/30' : 'bg-gray-200 text-gray-400'}`}>
                                    {idx < currentIndex ? '✓' : idx + 1}
                                </div>
                                <div className="text-[10px] md:text-xs text-center font-bold text-gray-500 w-full truncate px-1">
                                    {t.title.split(' ')[0]} {t.title.split(' ')[1]}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Content Card */}
                    <div className={`bg-${topic.trait} rounded-3xl shadow-lg border border-gray-100 overflow-hidden animate-slide-up mb-8`}>
                        <div className="bg-navy text-white px-8 py-5 border-b-4 border-gold">
                            <h2 className="text-3xl font-amiri font-bold">{topic.title}</h2>
                        </div>
                        
                        <div className="p-8">
                            <div className="mb-10 text-gray-800 leading-relaxed">
                                {topic.content}
                            </div>
                            <hr className="border-gray-200 mb-8" />
                            <div className="mb-10">
                                <h3 className="text-xl font-bold text-navy mb-4 border-r-4 border-gold pr-2">التلخيص الشجري للموضوع:</h3>
                                <div className="bg-white/50 p-6 rounded-2xl overflow-x-auto hide-scrollbar border border-gold/20">
                                    {topic.tree}
                                </div>
                            </div>
                            <hr className="border-gray-200 mb-8" />
                            <div>
                                <h3 className="text-xl font-bold text-navy mb-4 border-r-4 border-emerald-500 pr-2">تأكيد الفهم السريع للعبور:</h3>
                                {topic.activity.type === "fill-blank" ? 
                                    <FillBlankActivity key={`act-${topic.id}`} activity={topic.activity} onPass={() => setActivityPassed(true)} /> : 
                                    <MatchingActivity key={`act-${topic.id}`} activity={topic.activity} onPass={() => setActivityPassed(true)} />
                                }
                            </div>
                        </div>
                    </div>

                    {/* Navigation Buttons */}
                    <div className="flex justify-between items-center bg-white/95 backdrop-blur-sm p-4 rounded-2xl shadow-md border border-gray-200 sticky bottom-[80px] z-40">
                        <button 
                            type="button"
                            onClick={() => jumpToPrevious(currentIndex - 1)}
                            disabled={currentIndex === 0}
                            className={`px-6 py-2 rounded-xl font-bold transition-colors ${currentIndex === 0 ? 'text-gray-400 cursor-not-allowed' : 'text-navy border border-navy hover:bg-gray-50'}`}
                        >
                            السابق
                        </button>

                        <button 
                            type="button"
                            onClick={handleNext}
                            disabled={!activityPassed}
                            className={`px-8 py-3 rounded-xl font-bold text-lg shadow-md transition-all duration-300 flex items-center gap-2
                                ${activityPassed ? 'bg-navy text-white hover:bg-gold hover:text-navy hover:scale-105 animate-bounce-slight' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}
                        >
                            {isLast ? 'إتمام المادة العلمية' : 'التالي'}
                            {activityPassed && <svg className="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"></path></svg>}
                        </button>
                    </div>
                </div>
            );
        };

        const MindMapScreen = () => (
            <div className="p-8 max-w-7xl mx-auto animate-fade-in pb-20">
                <div className="text-center mb-12">
                    <h2 className="text-4xl font-amiri font-bold text-navy mb-2">الخريطة البصرية الشاملة</h2>
                    <p className="text-gray-600 text-lg">هيكلية مفاهيم الدرس الثاني كاملة</p>
                </div>
                <div className="relative flex flex-col items-center min-h-[500px] justify-start pt-10 overflow-x-auto hide-scrollbar">
                    <div className="mindmap-node text-2xl px-10 py-5 animate-pulse-glow z-20 mb-20 shadow-xl whitespace-nowrap">فقه المعاملات<br/><span className="text-gold text-lg">البيوع المحرمة والقرض</span></div>
                    <div className="absolute top-[100px] w-1 bg-gold h-[80px] z-10"></div>
                    <div className="absolute top-[180px] w-full max-w-[800px] h-1 bg-gold z-10"></div>
                    <div className="flex w-full max-w-[900px] justify-between relative z-20 gap-4 flex-nowrap min-w-[600px]">
                        <div className="flex flex-col items-center relative w-1/4">
                            <div className="absolute -top-[20px] w-1 h-[20px] bg-gold"></div>
                            <div className="mindmap-node mindmap-child text-sm md:text-lg w-full mb-6">البيوع المنهي عنها</div>
                            <div className="flex flex-col gap-2 w-full text-xs text-center"><div className="bg-trait1 p-2 rounded">وقت الجمعة</div><div className="bg-trait1 p-2 rounded">العينة</div><div className="bg-trait1 p-2 rounded">النجش</div></div>
                        </div>
                        <div className="flex flex-col items-center relative w-1/4">
                            <div className="absolute -top-[20px] w-1 h-[20px] bg-gold"></div>
                            <div className="mindmap-node mindmap-child text-sm md:text-lg w-full mb-6">عقود جائزة</div>
                            <div className="flex flex-col gap-2 w-full text-xs text-center"><div className="bg-trait2 p-2 rounded">الإقالة</div><div className="bg-trait3 p-2 rounded">المرابحة</div><div className="bg-trait4 p-2 rounded">التقسيط</div></div>
                        </div>
                        <div className="flex flex-col items-center relative w-1/4">
                            <div className="absolute -top-[20px] w-1 h-[20px] bg-gold"></div>
                            <div className="mindmap-node mindmap-child text-sm md:text-lg w-full mb-6 text-red-700">الربا</div>
                            <div className="flex flex-col gap-2 w-full text-xs text-center"><div className="bg-trait8 p-2 rounded text-red-700">محرم بالقرآن</div><div className="bg-trait8 p-2 rounded">ربا الفضل</div><div className="bg-trait8 p-2 rounded">ربا النسيئة</div></div>
                        </div>
                         <div className="flex flex-col items-center relative w-1/4">
                            <div className="absolute -top-[20px] w-1 h-[20px] bg-gold"></div>
                            <div className="mindmap-node mindmap-child text-sm md:text-lg w-full mb-6">القرض</div>
                            <div className="flex flex-col gap-2 w-full text-xs text-center"><div className="bg-trait5 p-2 rounded">مشروع ومستحب</div><div className="bg-trait5 p-2 rounded font-bold text-red-600">بزيادة = ربا</div></div>
                        </div>
                    </div>
                </div>
            </div>
        );

        const ReviewScreen = () => {
            const [flippedCards, setFlippedCards] = useState({});
            const [openQs, setOpenQs] = useState({});
            
            const toggleCard = (idx) => setFlippedCards(prev => ({...prev, [idx]: !prev[idx]}));
            const toggleQ = (idx) => setOpenQs(prev => ({...prev, [idx]: !prev[idx]}));

            return (
                <div className="p-4 md:p-8 max-w-7xl mx-auto animate-slide-up pb-32">
                    <div className="text-center mb-12">
                        <h2 className="text-4xl font-amiri font-bold text-navy mb-2">المراجعة الذكية</h2>
                        <p className="text-gray-600 text-lg">ثبت التعريفات والأحكام بالبطاقات والأسئلة التحليلية</p>
                    </div>
                    
                    <h3 className="text-2xl font-bold text-navy mb-6 border-r-4 border-gold pr-3">أولاً: بطاقات التعريفات والأحكام ({FLASHCARDS.length} بطاقة)</h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mb-16">
                        {FLASHCARDS.map((card, idx) => (
                            <div key={idx} className={`flip-card cursor-pointer ${flippedCards[idx] ? 'flipped' : ''}`} onClick={() => toggleCard(idx)}>
                                <div className="flip-card-inner">
                                    <div className="flip-card-front text-center">
                                        <div className="w-12 h-12 rounded-full border-2 border-gold flex items-center justify-center text-gold mb-3">
                                            <SVGIcons.Cards />
                                        </div>
                                        <h4 className="text-xl md:text-2xl font-amiri font-bold leading-relaxed">{card.front}</h4>
                                    </div>
                                    <div className="flip-card-back p-5 text-base md:text-lg font-bold shadow-inner flex items-center justify-center leading-loose border-2 border-gold/30 text-center">
                                        {card.back}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <h3 className="text-2xl font-bold text-navy mb-6 border-r-4 border-gold pr-3">ثانياً: الأسئلة المقالية ({ESSAY_QUESTIONS.length} أسئلة)</h3>
                    <div className="flex flex-col gap-4">
                        {ESSAY_QUESTIONS.map((item, idx) => {
                            const isOpen = openQs[idx];
                            const isGold = idx % 2 === 0;
                            const mainBg = isGold ? 'bg-gold' : 'bg-navy';
                            const mainText = isGold ? 'text-navy' : 'text-white';
                            const iconBg = isGold ? 'bg-navy text-gold' : 'bg-white text-navy';

                            return (
                                <div key={idx} className={`rounded-2xl border-2 shadow-sm transition-all duration-300 overflow-hidden ${isGold ? 'border-gold' : 'border-navy'}`}>
                                    <button
                                        onClick={() => toggleQ(idx)}
                                        className={`w-full text-right p-5 flex items-center justify-between font-bold text-xl transition-colors ${mainBg} ${mainText} hover:opacity-90`}
                                    >
                                        <span className="flex items-center gap-4">
                                            <span className={`w-8 h-8 flex items-center justify-center rounded-full shrink-0 shadow-md ${iconBg}`}>
                                                {idx + 1}
                                            </span>
                                            <span>{item.q}</span>
                                        </span>
                                        <svg className={`w-6 h-6 transform transition-transform duration-300 shrink-0 ${isOpen ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                                    </button>
                                    <div className={`transition-all duration-500 ease-in-out ${isOpen ? 'max-h-[500px] opacity-100' : 'max-h-0 opacity-0'}`}>
                                        <div className="p-6 bg-white text-navy text-lg leading-relaxed font-bold border-t border-gray-100">
                                            {item.a}
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const QuizScreen = ({ studentData, startTime }) => {
            const [currentQ, setCurrentQ] = useState(0);
            const [selectedAnswers, setSelectedAnswers] = useState({});
            const [isFinished, setIsFinished] = useState(false);
            const [score, setScore] = useState(0);
            const [timeSpent, setTimeSpent] = useState(0);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submitMessage, setSubmitMessage] = useState('');

            const handleSelect = (idx) => !isFinished && setSelectedAnswers(prev => ({...prev, [currentQ]: idx}));
            const nextQ = () => currentQ < QUIZ_QUESTIONS.length - 1 && setCurrentQ(prev => prev + 1);
            const prevQ = () => currentQ > 0 && setCurrentQ(prev => prev - 1);

            const finishQuiz = async () => {
                let s = 0;
                QUIZ_QUESTIONS.forEach((q, idx) => { if (selectedAnswers[idx] === q.answer) s++; });
                setScore(s);
                const diffMins = Math.round((new Date() - startTime) / 60000) || 1;
                setTimeSpent(diffMins);
                setIsFinished(true);
            };

            const submitToGoogleForms = async () => {
                setIsSubmitting(true);
                setSubmitMessage('جاري إرسال النتيجة صمتاً...');
                const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSe0zGzyfo7FfGHta0Ae-J5NYmFFCCLK4W2NdnG92dHH51IcBg/formResponse";
                const formData = new FormData();
                formData.append("entry.1186146438", "البيوع المحرمة ، والقرض");
                formData.append("entry.598195891", studentData.name);
                formData.append("entry.583802758", studentData.section);
                formData.append("entry.2010697018", score.toString());
                formData.append("entry.1329211307", timeSpent.toString());
                try {
                    await fetch(formUrl, { method: 'POST', mode: 'no-cors', body: formData });
                    setIsSubmitting(false); setSubmitMessage('✅ تم حفظ النتيجة بنجاح في سجلات الأستاذ.');
                } catch (error) {
                    setIsSubmitting(false); setSubmitMessage('✅ تم الحفظ (نهاية الاتصال).');
                }
            };

            if (isFinished) {
                return (
                    <div className="flex-grow flex items-center justify-center p-4 animate-fade-in">
                        <div className="glass-panel p-10 rounded-3xl max-w-2xl w-full text-center">
                            <h2 className="text-4xl font-amiri font-bold text-navy mb-6">نتيجة التقييم الشامل</h2>
                            <div className="bg-white rounded-2xl p-8 mb-8 border-2 border-gold relative shadow-inner">
                                <div className="text-7xl font-bold text-navy mb-4">{score} <span className="text-3xl text-gray-400">/ 20</span></div>
                                <div className="text-2xl font-bold text-gold mb-4">
                                    {score >= 18 ? "أداء مبهر وممتاز!" : score >= 14 ? "أداء جيد جداً!" : "تحتاج إلى مراجعة المادة مرة أخرى."}
                                </div>
                                <div className="flex justify-center gap-8 mt-6 text-gray-600 font-bold bg-gray-50 p-4 rounded-xl">
                                    <p>الوقت: {timeSpent} دقائق</p><p>الطالب: {studentData.name}</p>
                                </div>
                            </div>
                            {submitMessage ? (
                                <div className="p-4 rounded-xl font-bold bg-green-100 text-green-800">{submitMessage}</div>
                            ) : (
                                <button onClick={submitToGoogleForms} disabled={isSubmitting} className="w-full bg-emerald-600 text-white font-bold text-xl py-4 rounded-xl hover:bg-emerald-700 shadow-lg flex justify-center items-center gap-2">
                                    {isSubmitting ? 'جاري الإرسال...' : 'إنهاء وإرسال النتيجة للأستاذ'} {!isSubmitting && <SVGIcons.Check />}
                                </button>
                            )}
                        </div>
                    </div>
                );
            }

            const q = QUIZ_QUESTIONS[currentQ];
            const hasAnsweredAll = Object.keys(selectedAnswers).length === QUIZ_QUESTIONS.length;

            return (
                <div className="p-4 md:p-8 max-w-4xl mx-auto animate-fade-in pb-32 w-full">
                    <div className="flex justify-between items-center mb-8 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                        <div className="text-navy font-bold text-lg">السؤال {currentQ + 1} من {QUIZ_QUESTIONS.length}</div>
                        <div className="w-1/2 bg-gray-200 rounded-full h-3"><div className="bg-gold h-3 transition-all" style={{ width: `${((currentQ + 1) / QUIZ_QUESTIONS.length) * 100}%` }}></div></div>
                    </div>
                    <div className="bg-white rounded-3xl p-8 shadow-lg border-t-4 border-navy mb-8 min-h-[300px]">
                        <h3 className="text-2xl font-bold text-navy mb-8 leading-relaxed">{q.q}</h3>
                        <div className="space-y-4">
                            {q.options.map((opt, idx) => (
                                <button key={idx} onClick={() => handleSelect(idx)} className={`w-full text-right p-5 rounded-xl text-lg transition-all border-2 ${selectedAnswers[currentQ] === idx ? 'bg-navy text-white border-navy shadow-md transform scale-[1.01]' : 'bg-gray-50 text-gray-700 hover:border-gold'}`}>
                                    {opt}
                                </button>
                            ))}
                        </div>
                    </div>
                    <div className="flex justify-between items-center bg-white/95 backdrop-blur-sm p-4 rounded-2xl shadow-md border border-gray-200 sticky bottom-[80px] z-40">
                        <button onClick={prevQ} disabled={currentQ === 0} className={`px-6 py-3 rounded-xl font-bold ${currentQ === 0 ? 'bg-gray-200 text-gray-400' : 'bg-white text-navy border border-navy hover:bg-gray-50'}`}>السابق</button>
                        {currentQ === QUIZ_QUESTIONS.length - 1 ? (
                            <button onClick={finishQuiz} disabled={!hasAnsweredAll} className={`px-8 py-3 rounded-xl font-bold shadow-md transition-all ${!hasAnsweredAll ? 'bg-gray-300 text-gray-500' : 'bg-gold text-navy hover:scale-105'}`}>إنهاء التقييم</button>
                        ) : (
                            <button onClick={nextQ} className="px-8 py-3 rounded-xl font-bold bg-navy text-white shadow-md hover:scale-105 transition-transform">التالي</button>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [screen, setScreen] = useState(1);
            const [studentData, setStudentData] = useState(null);
            const [startTime, setStartTime] = useState(null);

            const handleStart = (name, section) => {
                setStudentData({ name, section }); setStartTime(new Date()); setScreen(2);
            };

            const NavButton = ({ targetScreen, icon, label }) => (
                <button onClick={() => setScreen(targetScreen)} className={`flex flex-col items-center p-2 rounded-lg transition-colors ${screen === targetScreen ? 'text-gold bg-navy' : 'text-gray-400 hover:text-navy hover:bg-gray-100'}`}>
                    {icon}<span className="text-xs font-bold mt-1">{label}</span>
                </button>
            );

            return (
                <div className="flex flex-col min-h-screen">
                    {screen > 1 && (
                        <header className="bg-white shadow-sm sticky top-0 z-50 p-4 border-b-2 border-gold flex justify-between items-center">
                            <div className="font-amiri font-bold text-xl text-navy">البيوع المحرمة والقرض</div>
                            <div className="text-sm bg-trait4 px-3 py-1 rounded-full border border-gold text-navy font-bold">{studentData.name.split(' ')[0]} ({studentData.section})</div>
                        </header>
                    )}
                    <main className="flex-grow flex flex-col relative bg-[url('https://www.transparenttextures.com/patterns/arabesque.png')]">
                        {screen === 1 && <WelcomeScreen onStart={handleStart} />}
                        {screen === 2 && <StepperContentScreen onComplete={() => setScreen(3)} />}
                        {screen === 3 && <MindMapScreen />}
                        {screen === 4 && <ReviewScreen />}
                        {screen === 5 && <QuizScreen studentData={studentData} startTime={startTime} />}
                    </main>
                    {screen > 1 && (
                        <nav className="fixed bottom-0 w-full bg-white shadow-[0_-4px_15px_rgba(0,0,0,0.05)] border-t border-gray-100 z-50">
                            <div className="max-w-md mx-auto flex justify-between px-6 py-2">
                                <NavButton targetScreen={2} icon={<SVGIcons.Book />} label="المادة" />
                                <NavButton targetScreen={3} icon={<SVGIcons.Map />} label="الخريطة" />
                                <NavButton targetScreen={4} icon={<SVGIcons.Cards />} label="المراجعة" />
                                <NavButton targetScreen={5} icon={<SVGIcons.Quiz />} label="التقييم" />
                            </div>
                        </nav>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
