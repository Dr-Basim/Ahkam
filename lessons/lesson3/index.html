            { q: "ما هو ضابط النوم الناقض للوضوء؟", a: "هو النوم العميق المستغرق الذي لو خرج من الإنسان شيء لم يحس به، أما النعاس الذي يشعر فيه بنفسه (كخفق الرأس) فلا ينقض." },
            { q: "لماذا سمي التخلي في طريق الناس باللاعنين؟", a: "لأن هذا الفعل القبيح يكون سبباً في أن يلعن الناس فاعله بسبب أذيتهم وتنجيس طرقهم ومجالسهم." },
            { q: "هل المضمضة والاستنشاق واجبان في الغسل؟ ولماذا؟", a: "نعم واجبان، لقوله تعالى {فاطهروا} والفم والأنف من البدن ويطهران في الوضوء فيشملهما الأمر الرباني." }
        ];

        const MCQS = [
            { q: "يسمى الملبوس على القدمين من صوف أو قطن بـ:", options: ["الخفين", "النعلين", "الجوارب", "الكنادر"], answer: 2 },
            { q: "رواية أن النبي مسح أعلى الخف وأسفله تُعتبر رواية:", options: ["صحيحة", "حسنة", "ضعيفة", "شاذة منكرة"], answer: 3 },
            { q: "إذا شك الإنسان هل أدخل الخفين طاهرتين أم لا؟", options: ["يمسح عليهما", "لا يمسح عليهما", "يتحرى ويجتهد", "يبني على الأكثر"], answer: 1 },
            { q: "الراجح في جلود السباع (كالنمور والحيات) أنها:", options: ["تطهر بالدباغ", "تطهر بالماء", "نجسة ولا تطهر بالدباغ", "طاهرة مطلقا"], answer: 2 },
            { q: "النوم الذي ينقض الوضوء هو:", options: ["النعاس الخفيف", "خفق الرأس", "النوم العميق المستغرق", "النوم مضطجعا فقط"], answer: 2 },
            { q: "صاحب سلس البول (الحدث الدائم) يجب عليه أن يتوضأ للصلاة:", options: ["قبل دخول الوقت", "بعد دخول وقت الصلاة", "لا يتوضأ بل يتيمم", "يتوضأ مرة في اليوم"], answer: 1 },
            { q: "الريح الخارجة من قُبل المرأة:", options: ["تنقض الوضوء", "لا تنقض الوضوء", "توجب الغسل", "تنجس الثياب"], answer: 1 },
            { q: "القاعدة الفقهية: اليقين لا يزول إلا بـ:", options: ["الشك", "الظن", "دليل شرعي", "الاحتمال"], answer: 2 },
            { q: "من اللاعنين التخلي في:", options: ["الصحراء المفتوحة", "طريق الناس ومجالسهم", "الخلاء بعيداً", "أماكن مستورة"], answer: 1 },
            { q: "حكم التغوط تحت الأشجار المثمرة:", options: ["جائز", "مكروه", "محرم لا يجوز", "مستحب"], answer: 2 },
            { q: "التخلي في مجالس أصحاب المنكر بقصد تفريقهم:", options: ["مستحب", "جائز شرعاً", "لا يجوز (محرم)", "واجب"], answer: 2 },
            { q: "الصفة الواجبة في الغسل تكفي فيها النية وتعميم البدن بالماء مع:", options: ["التثليث (ثلاث مرات)", "المضمضة والاستنشاق", "غسل الفرج فقط", "الوضوء الكامل أولاً"], answer: 1 },
            { q: "لو انغمس الجنب في بركة ماء بنية الغسل وتمضمض واستنشق:", options: ["غسله غير صحيح", "يجب أن يتوضأ للصلاة", "غسله صحيح ومجزئ", "يجب أن يكرر الغطس ثلاثا"], answer: 2 },
            { q: "الوضوء قبل غسل الجنابة يُعتبر:", options: ["سنة", "فرضا", "شرطا للصحة", "مكروها"], answer: 0 },
            { q: "التمندل (التنشيف بالمنديل) بعد الغسل حكمه:", options: ["سنة مؤكدة", "لا بأس به ولا حرج", "مكروه", "محرم"], answer: 1 },
            { q: "الغسل من الجنابة يرفع الحدث:", options: ["الأكبر فقط", "الأصغر فقط", "الأكبر والأصغر معاً", "لا يرفع شيئاً بدون وضوء"], answer: 2 },
            { q: "من كان عليه خفان لبسهما على طهارة، فالأفضل في حقه أن:", options: ["يخلعهما للوضوء", "يمسح عليهما", "يغسلهما", "يمسح أسفلهما"], answer: 1 },
            { q: "الوضوء من النعاس الخفيف (كخفق الرأس):", options: ["واجب", "مستحب", "لا يجب ولا ينقض", "مكروه"], answer: 2 },
            { q: "العلة في تحريم التغوط تحت الشجرة المثمرة:", options: ["نجاسة الأوراق", "أذية من يجني الثمر لاحقاً", "تغير لون الشجرة", "لا علة معروفة"], answer: 1 },
            { q: "معنى (فاطهروا) في آية الغسل يشمل:", options: ["ظاهر الجسد فقط", "شعر الرأس فقط", "الجسد مع الفم والأنف", "اليدين والرجلين فقط"], answer: 2 }
        ];

        // ==========================================
        // COMPONENTS
        // ==========================================

        const TopHeader = () => (
            <header className="bg-navy border-b-4 border-gold shadow-lg sticky top-0 z-50">
                <div className="container mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
                    {/* Left: Logo (Rectangular) & Doctor Name in Gold */}
                    <div className="flex flex-col items-center md:items-start w-full md:w-1/3">
                        <div className="h-12 mb-1 w-40 flex items-center justify-center">
                            <img src="../../logo.png" alt="شعار الجامعة" className="max-w-full max-h-full object-contain" />
                        </div>
                        <span className="font-bold text-gold text-sm tracking-wide">د/ باسم القرافي</span>
                    </div>
                    
                    {/* Center: Lecture Title in Gold */}
                    <div className="text-center w-full md:w-1/3">
                        <h1 className="font-amiri font-bold text-xl md:text-2xl text-gold">المحاضرة الثالثة: أحاديث من كتاب الطهارة</h1>
                    </div>

                    {/* Right: Course Name in Gold */}
                    <div className="w-full md:w-1/3 text-center md:text-right">
                        <span className="font-bold text-lg text-navy bg-gold px-5 py-2 rounded-lg shadow-inner">أحاديث الأحكام ١</span>
                    </div>
                </div>
            </header>
        );

        // State is lifted to this component to ensure it mounts/unmounts fresh based on topic Key
        const FormativeAssessment = ({ topic, onPass }) => {
            const [dropdownAnswers, setDropdownAnswers] = useState({});
            const [matchedPairs, setMatchedPairs] = useState([]);
            const [selectedLeft, setSelectedLeft] = useState(null);
            const [shuffledRight, setShuffledRight] = useState([]);
            const [shakeRight, setShakeRight] = useState(null);

            useEffect(() => {
                setShuffledRight([...topic.matching.map(m => m.right)].sort(() => Math.random() - 0.5));
            }, [topic]);

            const isDropdownsCorrect = Object.keys(topic.dropdowns.correct).length > 0 && 
                Object.keys(topic.dropdowns.correct).every(k => dropdownAnswers[k] === topic.dropdowns.correct[k]);
            const isMatchingCorrect = matchedPairs.length === topic.matching.length;

            useEffect(() => {
                if (isDropdownsCorrect && isMatchingCorrect) {
                    onPass(true);
                } else {
                    onPass(false);
                }
            }, [isDropdownsCorrect, isMatchingCorrect]);

            const handleMatch = (rightItem) => {
                if (!selectedLeft) return;
                const correctMatch = topic.matching.find(m => m.left === selectedLeft.left && m.right === rightItem);
                
                if (correctMatch) {
                    setMatchedPairs([...matchedPairs, selectedLeft.left]);
                } else {
                    setShakeRight(rightItem);
                    setTimeout(() => setShakeRight(null), 500);
                }
                setSelectedLeft(null);
            };

            const renderDropdownText = () => {
                return topic.dropdowns.text.split(/({q[1-3]})/g).map((part, i) => {
                    if (part.startsWith('{q')) {
                        const qKey = part.replace(/[{}]/g, '');
                        const isCorrect = dropdownAnswers[qKey] === topic.dropdowns.correct[qKey];
                        return (
                            <select 
                                key={i}
                                className={`mx-2 p-1 border-2 rounded outline-none font-bold text-base bg-white ${isCorrect ? 'border-green-500 text-green-700' : 'border-gold text-navy'}`}
                                value={dropdownAnswers[qKey] || ""}
                                onChange={(e) => setDropdownAnswers({...dropdownAnswers, [qKey]: e.target.value})}
                            >
                                <option value="" disabled>اختر الإجابة...</option>
                                {topic.dropdowns.options[qKey].map(opt => <option key={opt} value={opt}>{opt}</option>)}
                            </select>
                        );
                    }
                    return <span key={i} className="leading-loose text-lg font-bold text-navy">{part}</span>;
                });
            };

            return (
                <div className="mt-12 p-8 bg-white rounded-3xl shadow-xl border-t-8 border-gold">
                    <h3 className="text-3xl font-amiri font-bold text-navy mb-8 text-center bg-gray-50 py-3 rounded-lg border border-gray-200">التقييم التكويني المشروط (أجب لتنتقل)</h3>
                    
                    <div className="mb-10 p-6 bg-blue-50 rounded-2xl border border-blue-200 shadow-sm">
                        <h4 className="font-bold text-xl mb-4 text-blue-900 flex items-center gap-3">
                            <span className="bg-blue-600 text-white w-8 h-8 flex justify-center items-center rounded-full text-lg">أ</span> 
                            أكمل الفراغات بما يناسب:
                        </h4>
                        <div className="p-4 bg-white rounded-xl border border-gray-100">{renderDropdownText()}</div>
                    </div>

                    <div className="p-6 bg-purple-50 rounded-2xl border border-purple-200 shadow-sm">
                        <h4 className="font-bold text-xl mb-6 text-purple-900 flex items-center gap-3">
                            <span className="bg-purple-600 text-white w-8 h-8 flex justify-center items-center rounded-full text-lg">ب</span> 
                            صل العبارة من القائمة (أ) بما يناسبها في (ب):
                        </h4>
                        <div className="flex flex-col md:flex-row gap-8">
                            {/* Left List */}
                            <div className="flex-1 space-y-4">
                                {topic.matching.map((m, i) => {
                                    const isMatched = matchedPairs.includes(m.left);
                                    const isSelected = selectedLeft?.left === m.left;
                                    return (
                                        <div key={i} onClick={() => !isMatched && setSelectedLeft(m)}
                                            className={`matching-item p-4 border-2 rounded-xl text-center font-bold shadow-sm
                                                ${isMatched ? 'matched border-green-500' : isSelected ? 'selected' : 'border-navy bg-white hover:bg-gray-100'}`}>
                                            {m.left}
                                        </div>
                                    )
                                })}
                            </div>
                            {/* Right List */}
                            <div className="flex-1 space-y-4">
                                {shuffledRight.map((r, i) => {
                                    const isMatchedBySomeone = matchedPairs.some(left => topic.matching.find(match => match.left === left).right === r);
                                    const isShaking = shakeRight === r;
                                    return (
                                        <div key={i} onClick={() => !isMatchedBySomeone && handleMatch(r)}
                                            className={`matching-item p-4 border-2 rounded-xl text-center font-bold shadow-sm
                                                ${isMatchedBySomeone ? 'matched border-green-500' : isShaking ? 'wrong border-red-500' : 'border-gold bg-white hover:bg-gray-100'}`}>
                                            {r}
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // MAIN APP COMPONENT
        // ==========================================
        const App = () => {
            const [screen, setScreen] = useState('welcome'); 
            const [student, setStudent] = useState({ name: '', section: '', startTime: null });
            
            // Topics Flow State
            const [topicIndex, setTopicIndex] = useState(0);
            const [isPassed, setIsPassed] = useState(false);

            // Welcome Screen
            if (screen === 'welcome') {
                const handleStart = (e) => {
                    e.preventDefault();
                    const name = e.target.name.value.trim();
                    const section = e.target.section.value.trim();
                    if (name.split(/\s+/).length < 4) {
                        alert('الرجاء إدخال الاسم الرباعي كاملاً (٤ مقاطع على الأقل).'); return;
                    }
                    if (!section) {
                        alert('الرجاء إدخال رقم الشعبة.'); return;
                    }
                    setStudent({ name, section, startTime: new Date() });
                    setScreen('topics');
                };

                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4" style={{background: "linear-gradient(135deg, #16213e 0%, #1f2f5c 100%)"}}>
                        <div className="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-xl text-center border-b-8 border-gold fade-in relative overflow-hidden">
                            
                            <div className="w-48 h-20 mx-auto mb-4 flex items-center justify-center">
                                <img src="../../logo.png" alt="شعار الجامعة" className="max-w-full max-h-full object-contain" />
                            </div>
                            
                            <h2 className="text-xl font-bold text-gray-500 mb-2 tracking-wider">د/ باسم القرافي</h2>
                            <div className="h-px bg-gray-200 w-1/2 mx-auto mb-4"></div>
                            
                            <h1 className="text-3xl font-amiri font-bold text-navy mb-4 bg-gold bg-opacity-20 inline-block px-6 py-2 rounded-full">أحاديث الأحكام ١</h1>
                            <h3 className="text-4xl font-amiri font-bold text-navy mb-10 leading-relaxed">المحاضرة الثالثة<br/><span className="text-2xl text-gold">أحاديث من كتاب الطهارة</span></h3>
                            
                            <form onSubmit={handleStart} className="space-y-6 text-right">
                                <div className="bg-gray-50 p-6 rounded-2xl border border-gray-200 shadow-inner">
                                    <div className="mb-6">
                                        <label className="block text-navy font-bold mb-3 text-lg">الاسم الرباعي:</label>
                                        <input type="text" name="name" required placeholder="أدخل اسمك الرباعي هنا" className="w-full p-4 rounded-xl border-2 border-gray-300 focus:border-gold outline-none text-lg transition-colors" />
                                    </div>
                                    <div>
                                        <label className="block text-navy font-bold mb-3 text-lg">رقم الشعبة:</label>
                                        <input type="text" name="section" required placeholder="مثال: YM3" className="w-full p-4 rounded-xl border-2 border-gray-300 focus:border-gold outline-none text-lg transition-colors" />
                                    </div>
                                </div>
                                <button type="submit" className="btn-glow w-full bg-navy text-gold font-bold py-5 rounded-2xl text-2xl hover:bg-lightNavy transition shadow-xl mt-4 border-2 border-navy">
                                    دخول للمحاضرة وبدء التعلم
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            // Wrapper for TopHeader and container
            const ScreenWrapper = ({ children }) => (
                <div className="min-h-screen pb-24">
                    <TopHeader />
                    <div className="container mx-auto px-4 mt-8 max-w-5xl">
                        {children}
                    </div>
                </div>
            );

            // Topics Screen
            if (screen === 'topics') {
                const topic = TOPICS_DATA[topicIndex];
                
                const handleNextTopic = () => {
                    if (topicIndex < TOPICS_DATA.length - 1) {
                        setIsPassed(false); // Reset parent state
                        setTopicIndex(topicIndex + 1);
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } else {
                        setScreen('review');
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                };

                // Counter to alternate benefit box colors
                let benefitCounter = 0;

                return (
                    <ScreenWrapper>
                        <div className="fade-in">
                            <div className="flex justify-between items-center mb-8 bg-white p-4 rounded-xl shadow border border-gold">
                                <span className="font-bold text-navy bg-gray-100 px-4 py-2 rounded-lg text-lg">الوحدة {topicIndex + 1} من {TOPICS_DATA.length}</span>
                                <span className="font-bold text-navy bg-gold bg-opacity-30 px-6 py-2 rounded-lg text-lg">{student.name}</span>
                            </div>

                            <h2 className="text-4xl md:text-5xl font-amiri font-bold text-navy mb-10 text-center leading-tight bg-white p-6 rounded-2xl shadow-sm border-b-4 border-gold">
                                {topic.title}
                            </h2>

                            {/* Cells Layout */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
                                {topic.cells.map((cell, idx) => {
                                    if (cell.type === 'verse') {
                                        return (
                                            <div key={idx} className="col-span-1 md:col-span-2 verse-card p-8 rounded-2xl text-center text-2xl leading-loose font-bold content-cell shadow-lg">
                                                {cell.content}
                                            </div>
                                        );
                                    }
                                    
                                    if (cell.type === 'benefit_box') {
                                        const isNavy = benefitCounter % 2 === 0;
                                        benefitCounter++;
                                        return (
                                            <div key={idx} className={`col-span-1 md:col-span-2 p-6 rounded-2xl shadow-md content-cell flex flex-col md:flex-row gap-6 items-center border-l-8 ${isNavy ? 'bg-navy text-gold border-gold' : 'bg-gold text-navy border-navy'}`}>
                                                <div className="md:w-1/4 text-center">
                                                    <span className={`font-amiri font-bold text-2xl px-4 py-2 rounded-lg inline-block ${isNavy ? 'bg-gold text-navy' : 'bg-navy text-gold'}`}>{cell.title}</span>
                                                </div>
                                                <div className="md:w-3/4 text-xl leading-loose" dangerouslySetInnerHTML={{ __html: cell.content }} />
                                            </div>
                                        );
                                    }

                                    // Other info/warning cells
                                    const getCellStyles = () => {
                                        if (cell.type === 'warning') return 'bg-red-50 border-red-200 border-t-4 border-t-red-500';
                                        return 'bg-blue-50 border-blue-200 border-t-4 border-t-blue-500';
                                    };

                                    return (
                                        <div key={idx} className={`col-span-1 p-8 rounded-2xl shadow-sm content-cell ${getCellStyles()}`}>
                                            <h4 className="font-bold text-navy text-2xl mb-4 font-amiri">{cell.title}</h4>
                                            <div className="text-gray-800 text-xl leading-loose font-medium" dangerouslySetInnerHTML={{ __html: cell.content }} />
                                        </div>
                                    );
                                })}
                            </div>

                            {/* Mindmap */}
                            <div className="mb-16">
                                <h3 className="text-3xl font-bold text-navy mb-6 text-center font-amiri border-b-2 border-gold pb-2 inline-block relative left-1/2 transform -translate-x-1/2">الخريطة الذهنية البصرية</h3>
                                <div className="mindmap-wrapper">
                                    <div className="mindmap-root">{topic.mindmap.root}</div>
                                    <div className="mindmap-branches">
                                        {topic.mindmap.branches.map((b, i) => <div key={i} className="mindmap-node">{b}</div>)}
                                    </div>
                                </div>
                            </div>

                            {/* Assessment - Key forces clean remount */}
                            <FormativeAssessment key={topic.id} topic={topic} onPass={setIsPassed} />

                            {isPassed && (
                                <div className="mt-12 text-center fade-in bg-green-50 p-8 rounded-3xl border-2 border-green-500 shadow-lg">
                                    <p className="text-green-700 font-bold text-2xl mb-6">أحسنت! الإجابات صحيحة بالكامل.</p>
                                    <button type="button" onClick={handleNextTopic} className="btn-glow bg-navy text-gold px-16 py-5 rounded-2xl font-bold text-2xl hover:bg-lightNavy shadow-xl border-2 border-gold transition-all">
                                        {topicIndex < TOPICS_DATA.length - 1 ? 'الانتقال للوحدة التالية' : 'الانتقال للمراجعة الذكية'}
                                    </button>
                                </div>
                            )}
                        </div>
                    </ScreenWrapper>
                );
            }

            // Review Screen
            if (screen === 'review') {
                const [flipped, setFlipped] = useState({});
                const [acc, setAcc] = useState(null);

                return (
                    <ScreenWrapper>
                        <div className="fade-in bg-white p-8 rounded-3xl shadow-xl border-t-8 border-navy">
                            <h2 className="text-4xl md:text-5xl font-amiri font-bold text-navy mb-12 text-center bg-gold bg-opacity-20 py-4 rounded-xl">المراجعة الذكية المزدوجة</h2>
                            
                            <h3 className="text-3xl font-bold text-navy mb-8 font-amiri flex items-center gap-3"><span className="bg-navy text-gold px-4 py-1 rounded">1</span> بطاقات المفاهيم (انقر للقلب)</h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6 mb-16">
                                {FLASHCARDS.map((c, i) => (
                                    <div key={i} className="h-48 perspective-1000 cursor-pointer content-cell" onClick={() => setFlipped({...flipped, [i]: !flipped[i]})}>
                                        <div className={`relative w-full h-full transform-style-3d ${flipped[i] ? 'rotate-y-180' : ''}`}>
                                            <div className="absolute w-full h-full backface-hidden bg-white border-2 border-gold rounded-2xl shadow-lg flex items-center justify-center p-4 text-center">
                                                <h4 className="font-bold text-2xl text-navy font-amiri">{c.front}</h4>
                                            </div>
                                            <div className="absolute w-full h-full backface-hidden rotate-y-180-back bg-navy text-gold rounded-2xl shadow-lg flex items-center justify-center p-4 text-center border-2 border-navy">
                                                <p className="font-tajawal text-lg leading-relaxed">{c.back}</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <h3 className="text-3xl font-bold text-navy mb-8 font-amiri flex items-center gap-3"><span className="bg-navy text-gold px-4 py-1 rounded">2</span> أسئلة مقالية تحليلية (انقر للإظهار)</h3>
                            <div className="space-y-4 max-w-4xl mx-auto mb-16">
                                {ESSAYS.map((e, i) => (
                                    <div key={i} className="border-2 border-gray-200 rounded-2xl overflow-hidden shadow-sm">
                                        <button type="button" onClick={() => setAcc(acc === i ? null : i)} className="w-full text-right p-6 font-bold text-xl text-navy bg-gray-50 hover:bg-gray-100 flex justify-between items-center transition-colors">
                                            <span>{i + 1}. {e.q}</span>
                                            <span className="text-gold text-3xl font-bold">{acc === i ? '−' : '+'}</span>
                                        </button>
                                        {acc === i && <div className="p-6 bg-white text-navy font-medium text-xl leading-loose border-t-2 border-gray-200 fade-in">{e.a}</div>}
                                    </div>
                                ))}
                            </div>

                            <div className="text-center mt-12 border-t-2 border-gray-100 pt-10">
                                <button type="button" onClick={() => { setScreen('assessment'); window.scrollTo(0,0); }} className="btn-glow bg-red-700 text-white px-16 py-5 rounded-2xl font-bold text-3xl hover:bg-red-800 shadow-2xl transition-all">
                                    دخول التقييم الشامل النهائي
                                </button>
                            </div>
                        </div>
                    </ScreenWrapper>
                );
            }

            // Assessment Screen
            if (screen === 'assessment') {
                const [answers, setAnswers] = useState({});
                const [isSubmitting, setIsSubmitting] = useState(false);

                const handleSubmit = async () => {
                    if (Object.keys(answers).length < MCQS.length) {
                        alert("الرجاء الإجابة على جميع الأسئلة 20 قبل الإرسال."); return;
                    }
                    setIsSubmitting(true);
                    
                    let score = 0;
                    MCQS.forEach((q, i) => { if (answers[i] === q.answer) score++; });
                    
                    const timeSpentMins = Math.round((new Date() - student.startTime) / 60000);

                    // Form Submission
                    const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSeAtWpsGVdYNm6qt88dhkrd_Kj2kiyWBQiejpNjLvBfsOkPzw/formResponse";
                    const formData = new FormData();
                    formData.append("entry.631676590", "الثالثة"); 
                    formData.append("entry.716230744", student.name);
                    formData.append("entry.258825401", student.section);
                    formData.append("entry.1926766466", score.toString());
                    formData.append("entry.585619026", timeSpentMins.toString());

                    try {
                        await fetch(formUrl, { method: "POST", mode: "no-cors", body: formData });
                    } catch (e) { console.error(e); }
                    
                    setStudent({...student, finalScore: score});
                    setScreen('success');
                };

                return (
                    <ScreenWrapper>
                        <div className="fade-in bg-white p-8 rounded-3xl shadow-xl border-t-8 border-gold">
                            <h2 className="text-5xl font-amiri font-bold text-navy mb-6 text-center">التقييم الشامل</h2>
                            <div className="bg-navy text-gold p-4 rounded-xl text-center font-bold text-xl mb-12 shadow-md">
                                أجب عن جميع الأسئلة الـ 20 لإنهاء المهمة وإرسال نتيجتك.
                            </div>

                            <div className="space-y-8">
                                {MCQS.map((q, qIdx) => (
                                    <div key={qIdx} className="bg-gray-50 p-8 rounded-2xl border-2 border-gray-200 hover:border-gold transition-colors">
                                        <h4 className="font-bold text-2xl mb-6 text-navy font-amiri">{qIdx + 1}. {q.q}</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {q.options.map((opt, optIdx) => (
                                                <label key={optIdx} className={`flex items-center p-4 rounded-xl border-2 cursor-pointer transition-all ${answers[qIdx] === optIdx ? 'bg-gold bg-opacity-20 border-gold' : 'bg-white border-gray-300 hover:bg-gray-100'}`}>
                                                    <input type="radio" name={`q-${qIdx}`} checked={answers[qIdx] === optIdx} onChange={() => setAnswers({...answers, [qIdx]: optIdx})} className="ml-4 h-6 w-6 text-navy" />
                                                    <span className="font-bold text-xl text-navy">{opt}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="text-center mt-16 border-t-4 border-gray-100 pt-10">
                                <button type="button" onClick={handleSubmit} disabled={isSubmitting} className={`btn-glow bg-navy text-gold px-20 py-6 rounded-2xl font-bold text-3xl shadow-2xl border-2 border-gold ${isSubmitting ? 'opacity-50' : 'hover:bg-lightNavy transition-all'}`}>
                                    {isSubmitting ? 'جاري الإرسال الموثوق...' : 'إنهاء وإرسال النتيجة'}
                                </button>
                            </div>
                        </div>
                    </ScreenWrapper>
                );
            }

            // Success Screen
            if (screen === 'success') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4" style={{background: "linear-gradient(135deg, #16213e 0%, #1f2f5c 100%)"}}>
                        <div className="bg-white p-12 rounded-3xl shadow-2xl text-center max-w-xl w-full fade-in border-4 border-gold relative">
                            <div className="text-7xl mb-6">🎓</div>
                            <h2 className="text-5xl font-amiri font-bold text-navy mb-8">تمت المهمة بنجاح!</h2>
                            
                            <div className="bg-gray-50 p-6 rounded-2xl border border-gray-200 mb-8 space-y-4">
                                <p className="text-2xl text-navy">الطالب: <span className="font-bold">{student.name}</span></p>
                                <p className="text-2xl text-navy">الشعبة: <span className="font-bold">{student.section}</span></p>
                            </div>
                            
                            <div className="inline-block bg-navy border-8 border-gold rounded-full h-56 w-56 flex items-center justify-center flex-col shadow-2xl mx-auto mb-10">
                                <span className="text-gold font-bold text-xl mb-2">الدرجة</span>
                                <span className="text-7xl font-bold text-white">{student.finalScore}</span>
                                <span className="text-gold font-bold text-xl mt-2">من 20</span>
                            </div>
                            
                            <div className="bg-green-100 text-green-800 p-4 rounded-xl border border-green-300">
                                <p className="font-bold text-xl">تم إرسال نتيجتك للدكتور باسم القرافي بنجاح.</p>
                                <p className="mt-2 text-lg">يمكنك إغلاق هذه الصفحة الآن بأمان.</p>
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
