                    { type: 'info', title: 'شرح المفردات', content: "قال المؤلف الحافظ ابن حجر رحمه الله في كتابه (بلوغ المرام: باب المسح على الخفين)، وذكر ذلك بعد أن ذكر الأحاديث الواردة في صفة الوضوء، لأن الخفين ما يلبس على الرجل من جلد أو نحوه، وإذا كان الملبوس على القدمين من صوف أو قطن أو ما أشبه ذلك يسمى جورباً ويسمى عند العامة الشراب." },
                    { type: 'info', title: 'المسح على الخفين من محاسن الشريعة', content: "والمسح على الخفين من <span class='hl-gold'>محاسن الشريعة وتسهيلها وتيسيرها</span>، وذلك لأن القدمين -ولا سيما في الشتاء- يلحقهما البرد، ويتعب الرجل، وإذا ضربه أدنى شيء أدمى أصابعه أو عقبه أو ما أشبه ذلك، فكان من محاسن الشريعة أن يسر الله عز وجل على العباد، وأباح لهم المسح على الخفين، أو على الجوارب." },
                    { type: 'warning', title: 'الشرط الأساسي: اللبس على طهارة', content: "ولكن يشترط لذلك أن يلبسهما على <span class='hl-red'>طهارة</span>، فلا يصح أن يمسح على الخفين إذا لبسهما على غير طهارة، ودليل ذلك حديث المغيرة بن شعبة رضي الله عنه أنه كان مع النبي صلى الله عليه وسلم، وكان النبي صلى الله عليه وسلم يتوضأ، فلما بلغ رجليه أهوى المغيرة لينزع الخفين، فقال النبي صلى الله عليه وسلم: «دعهما فإني أدخلتهما طاهرتين»، فمسح عليهما." },
                    { type: 'warning', title: 'رواية شاذة منكرة', content: "وأما رواية أن النبي صلى الله عليه وسلم مسح أعلى الخف وأسفله فهي رواية <span class='hl-red'>شاذة منكرة لا عبرة بها</span>، والمسح إنما يكون لأعلى الخف كما في حديث علي بن أبي طالب رضي الله عنه وسيأتي إن شاء الله." },

            const [dropdownAnswers, setDropdownAnswers] = useState({});
            const [matchedPairs, setMatchedPairs] = useState([]);
            const [selectedLeft, setSelectedLeft] = useState(null);
            const [shuffledRight, setShuffledRight] = useState([]);
            const [shakeRight, setShakeRight] = useState(null);

            useEffect(() => {
                setDropdownAnswers({});
                setMatchedPairs([]);
                setSelectedLeft(null);
                setShakeRight(null);
                setShuffledRight([...topic.matching.map(m => m.right)].sort(() => Math.random() - 0.5));
                onPass(false); 
            }, [topic.id, onPass]);

            const isDropdownsCorrect = Object.keys(topic.dropdowns.correct).length > 0 && 
                Object.keys(topic.dropdowns.correct).every(k => dropdownAnswers[k] === topic.dropdowns.correct[k]);
            const isMatchingCorrect = matchedPairs.length === topic.matching.length && topic.matching.length > 0;

            useEffect(() => {
                if (isDropdownsCorrect && isMatchingCorrect) {
                    onPass(true);
                }
            }, [isDropdownsCorrect, isMatchingCorrect, onPass]);

            const handleMatch = (rightItem) => {
                if (!selectedLeft) return;
                const correctMatch = topic.matching.find(m => m.left === selectedLeft.left && m.right === rightItem);
                
                if (correctMatch) {
                    setMatchedPairs(prev => [...prev, selectedLeft.left]);
                } else {
                    setShakeRight(rightItem);
                    setTimeout(() => setShakeRight(null), 500);
                }
                setSelectedLeft(null);
            };

            const renderDropdownText = () => {
                return topic.dropdowns.text.split(/({q[1-3]})/g).map((part, i) => {
                    if (part.startsWith('{q')) {
                        const qKey = part.replace(/[{}]/g, '');
                        const isCorrect = dropdownAnswers[qKey] === topic.dropdowns.correct[qKey];
                        return (
                            <select 
                                key={i}
                                className={`mx-2 p-1 border-2 rounded outline-none font-bold text-lg bg-white ${isCorrect ? 'border-green-500 text-green-700' : 'border-gold text-navy'}`}
                                value={dropdownAnswers[qKey] || ""}
                                onChange={(e) => setDropdownAnswers({...dropdownAnswers, [qKey]: e.target.value})}
                            >
                                <option value="" disabled>اختر الإجابة...</option>
