                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];

                    { q: "أصل الوضوء بقاؤه، وهذا تطبيق لقاعدة:", o: ["المشقة تجلب التيسير", "اليقين لا يزول بالشك", "الضرر يزال", "الضرورات تبيح المحظورات"], a: "اليقين لا يزول بالشك" },
                    { q: "يجوز الاستعانة بالغير في الوضوء بدليل:", o: ["حديث عائشة", "فعل المغيرة مع النبي", "حديث أنس", "القرآن"], a: "فعل المغيرة مع النبي" },
                    { q: "محل الفرض في غسل القدم هو إلى:", o: ["الكعبين", "الركبتين", "أصابع القدم", "الساق"], a: "الكعبين" },
                    { q: "توفيت عائشة رضي الله عنها سنة:", o: ["40هـ", "58هـ", "70هـ", "90هـ"], a: "58هـ" }
                ]
            };

            // --- Header Component ---
            const Banner = () => (
                <div className="bg-navy text-white p-6 shadow-2xl border-b-4 border-gold sticky top-0 z-50">
                    <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center">
                        <div className="flex flex-col items-center md:items-start order-2 md:order-1">
                            <div className="w-48 h-12 bg-white rounded-lg p-2 mb-2 flex items-center justify-center">
                                <img src="../../logo.png" alt="شعار الجامعة" className="max-h-full object-contain" />
                            </div>
                            <span className="text-gold font-bold text-sm tracking-widest">{lectureData.professor}</span>
                        </div>
                        <div className="text-center order-1 md:order-2 mb-4 md:mb-0">
                            <h1 className="font-amiri text-2xl md:text-3xl font-bold border-x-2 border-gold/30 px-6">
                                {lectureData.lecture}
                            </h1>
                        </div>
                        <div className="bg-gold text-navy px-6 py-2 rounded-full font-black text-sm order-3">
                            {lectureData.course}
                        </div>
                    </div>
                </div>
            );

            // --- Modal Component ---
            const Modal = () => (
                <div className={`fixed inset-0 z-[100] flex items-center justify-center p-4 bg-navy/95 backdrop-blur-xl transition-all duration-500 ${showModal ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                    <div className="relative max-w-7xl w-full bg-white rounded-[2rem] p-4 shadow-2xl border-8 border-gold overflow-auto max-h-[95vh]">
                        <button onClick={() => setShowModal(false)} className="absolute top-4 left-4 bg-hlRed text-white w-12 h-12 rounded-full font-black text-2xl z-10 hover:scale-110 transition-transform">×</button>
                        <div className="p-4 text-center">
                            <h4 className="text-2xl font-bold text-navy mb-6">الملخص المصور للمحاضرة</h4>
                            <img src={modalImg} className="w-full h-auto rounded-xl shadow-inner border-2 border-gold/10" alt="Summary" onError={e => e.target.src="https://placehold.co/1200x800?text=الملخص+المصور"} />
                        </div>
                    </div>
                </div>
            );

            // --- Login/Welcome Screen ---
            const WelcomeScreen = () => {
                const [n, setN] = useState('');
                const [s, setS] = useState('');
                const isValid = n.trim().split(/\s+/).length >= 4 && s;
                return (
                    <div className="max-w-xl mx-auto mt-20 p-12 bg-white rounded-[3rem] shadow-2xl border border-gold/20 text-center fade-in relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-gold opacity-10 rounded-bl-full"></div>
                        <h2 className="text-4xl font-amiri font-bold text-navy mb-10">مرحباً بك في قاعة المحاضرات</h2>
                        <div className="space-y-6 text-right">
                            <div>
                                <label className="block text-navy font-bold mb-2 pr-2">الاسم الرباعي كاملاً:</label>
                                <input className="w-full p-4 rounded-2xl border-2 border-gold/30 focus:border-navy outline-none shadow-inner" value={n} onChange={e => setN(e.target.value)} placeholder="أدخل اسمك كما في السجل" />
                            </div>
                            <div>
                                <label className="block text-navy font-bold mb-2 pr-2">رقم الشعبة:</label>
                                <input className="w-full p-4 rounded-2xl border-2 border-gold/30 focus:border-navy outline-none shadow-inner" value={s} onChange={e => setS(e.target.value)} placeholder="مثال: 101" />
                            </div>
                            <button disabled={!isValid} onClick={() => { setUser({name:n, section:s, startTime:new Date()}); setScreen('topics'); }} className={`w-full py-5 rounded-2xl font-bold text-xl transition-all shadow-xl ${isValid ? 'bg-navy text-gold hover:scale-[1.02]' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}>دخول المحاضرة</button>
                        </div>
                    </div>
                );
            };

            // --- Topic Flow Component ---
            const TopicFlow = () => {
                const topic = lectureData.topics[currentIndex];
                const [qStates, setQStates] = useState({});
                const [matchStates, setMatchStates] = useState({});
                const [activeL, setActiveL] = useState(null);

                const isLocked = !topic.formative.every(q => {
                    if (q.type === 'drop') return qStates[q.id] === q.correct;
                    if (q.type === 'match') return Object.keys(matchStates[q.id] || {}).length === q.pairs.length;
                    return false;
                });

                const handleMatch = (qid, l, r) => {
                    if (!l) return;
                    const q = topic.formative.find(x => x.id === qid);
                    if (q.pairs.find(p => p.a === l).b === r) {
                        setMatchStates(prev => ({...prev, [qid]: {...(prev[qid]||{}), [l]: r}}));
                        setActiveL(null);
                    } else {
                        alert("محاولة خاطئة!"); setActiveL(null);
                    }
                };

                const next = () => {
                    setQStates({}); setMatchStates({}); setActiveL(null);
                    if (currentIndex < 3) setCurrentIndex(prev => prev + 1);
                    else {
                        setFinalQuestions(shuffleArray(lectureData.mcqs.map(q => ({...q, options: shuffleArray(q.o)}))));
                        setScreen('review');
                    }
                };

                return (
                    <div className="max-w-6xl mx-auto mt-10 pb-24 px-4 fade-in">
                        <div className="bg-white rounded-[3rem] shadow-2xl border border-gold/20 overflow-hidden">
                            <div className="bg-navy p-8 text-gold flex justify-between items-center">
                                <h3 className="text-3xl font-amiri font-bold">{topic.title}</h3>
                                <button onClick={() => { setModalImg(topic.image); setShowModal(true); }} className="bg-gold text-navy px-8 py-3 rounded-full font-bold flex items-center gap-2 hover:scale-105 transition-transform">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                                    ملخص مصور
                                </button>
                            </div>
                            <div className="p-10">
                                <div className="verse shadow-inner">{topic.hadith}</div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mt-10">
                                    {topic.fullContent.map((sec, i) => (
                                        <div key={i} className={`p-8 rounded-[2rem] border-r-8 shadow-sm transition-all hover:shadow-md ${i%2===0 ? 'bg-trait1 border-navy' : 'bg-trait3 border-gold'}`}>
                                            <h4 className="text-xl font-black text-navy mb-4 border-b-2 border-gold/20 pb-2">{sec.h}</h4>
                                            <p className="text-lg leading-relaxed text-gray-800" dangerouslySetInnerHTML={{__html: sec.p}}></p>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-16 bg-navy/5 p-10 rounded-[3rem] border border-navy/10 space-y-8">
                                    <h4 className="text-2xl font-bold text-navy flex items-center gap-3">التقييم التكويني (أجب للانتقال):</h4>
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                        {topic.formative.map((q, i) => (
                                            <div key={i} className="bg-white p-6 rounded-2xl shadow-sm border border-gold/20">
                                                <span className="text-xs font-black text-gold uppercase tracking-tighter mb-2 block">سؤال {i+1}</span>
                                                {q.type === 'drop' ? (
                                                    <div className="text-lg leading-loose">
                                                        {q.text.split('____').map((part, pi) => (
                                                            <React.Fragment key={pi}>
                                                                {part}
                                                                {pi === 0 && (
                                                                    <select className="mx-2 p-2 border-2 border-navy rounded-lg font-bold text-navy" value={qStates[q.id]||''} onChange={e => setQStates({...qStates, [q.id]: e.target.value})}>
                                                                        <option value="">اختر</option>
                                                                        {q.opts.map(o => <option key={o} value={o}>{o}</option>)}
                                                                    </select>
                                                                )}
                                                            </React.Fragment>
                                                        ))}
                                                    </div>
                                                ) : (
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div className="space-y-2">
                                                            {q.pairs.map(p => (
                                                                <button key={p.a} disabled={!!(matchStates[q.id]||{})[p.a]} onClick={() => setActiveL(p.a)} className={`w-full p-2 text-xs rounded-lg font-bold border-2 transition-all ${ (matchStates[q.id]||{})[p.a] ? 'bg-green-100 border-green-500 text-green-700' : activeL === p.a ? 'bg-gold' : 'bg-white border-gold' }`}>{p.a}</button>
                                                            ))}
                                                        </div>
                                                        <div className="space-y-2">
                                                            {q.pairs.map(p => (
                                                                <button key={p.b} disabled={Object.values(matchStates[q.id]||{}).includes(p.b)} onClick={() => handleMatch(q.id, activeL, p.b)} className="w-full p-2 text-xs rounded-lg font-bold bg-navy text-white hover:bg-gold hover:text-navy disabled:opacity-20 transition-all">{p.b}</button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                    <button disabled={isLocked} onClick={next} className={`w-full py-6 rounded-3xl font-black text-2xl shadow-xl transition-all ${!isLocked ? 'bg-navy text-gold hover:scale-[1.02]' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>الوحدة التالية</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- Smart Review Component ---
            const ReviewScreen = () => {
                const [openE, setOpenE] = useState(null);
                return (
                    <div className="max-w-7xl mx-auto mt-10 pb-32 px-4 fade-in">
                        <div className="text-center mb-16">
                            <h2 className="text-5xl font-amiri font-bold text-navy mb-4">المراجعة والتقويم الذاتي</h2>
                            <div className="h-1.5 w-32 bg-gold mx-auto rounded-full"></div>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 mb-20">
                            {lectureData.flashcards.map((c, i) => (
                                <div key={i} className="flip-card">
                                    <div className="flip-card-inner">
                                        <div className="flip-card-front text-2xl font-amiri leading-relaxed">{c.q}</div>
                                        <div className="flip-card-back text-lg leading-loose">{c.a}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="max-w-4xl mx-auto bg-white p-12 rounded-[3rem] shadow-2xl border border-gold/10">
                            <h3 className="text-3xl font-bold text-navy mb-10 border-b-4 border-gold/20 pb-4">الأسئلة المقالية والتحليلية:</h3>
                            <div className="space-y-4">
                                {lectureData.essays.map((e, i) => (
                                    <div key={i} className="rounded-2xl overflow-hidden border border-gray-100 shadow-sm">
                                        <button onClick={() => setOpenE(openE === i ? null : i)} className={`w-full p-6 flex justify-between items-center transition-all ${i%2===0 ? 'bg-navy text-gold' : 'bg-gold text-navy'}`}>
                                            <span className="font-bold text-xl">{i+1}. {e.q}</span>
                                            <span className={`transform transition-transform ${openE===i?'rotate-180':''}`}>▼</span>
                                        </button>
                                        {openE === i && <div className="p-8 bg-cream text-hlBlue font-bold text-lg leading-loose fade-in border-t-2 border-gold/20">{e.a}</div>}
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="text-center mt-20">
                            <button onClick={() => setScreen('exam')} className="bg-hlRed text-white px-24 py-8 rounded-full font-black text-3xl shadow-2xl hover:bg-navy transition-all hover:scale-105 active:scale-95">بدء الاختبار النهائي (20 سؤال)</button>
                        </div>
                    </div>
                );
            };

            // --- Final Exam Component ---
            const ExamScreen = () => {
                const isReady = examAnswers.filter(a => a !== null).length === 20;
                return (
                    <div className="max-w-4xl mx-auto mt-10 pb-32 px-4 fade-in">
                        <div className="bg-navy text-gold p-8 rounded-[2.5rem] sticky top-28 z-[40] flex justify-between items-center shadow-2xl border-4 border-gold">
                            <div className="flex flex-col">
                                <span className="text-xs opacity-60 uppercase tracking-widest">اسم الطالب</span>
                                <span className="font-black text-xl">{user.name}</span>
                            </div>
                            <div className="text-center">
                                <span className="text-xs opacity-60 uppercase block">التقدم</span>
                                <span className="font-black text-3xl">{examAnswers.filter(a => a !== null).length} / 20</span>
                            </div>
                        </div>
                        <div className="space-y-12 mt-16">
                            {finalQuestions.map((q, i) => (
                                <div key={i} className="bg-white p-10 rounded-[3rem] shadow-xl border-r-[15px] border-gold transform transition-all hover:-translate-x-2">
                                    <h4 className="text-2xl font-black text-navy mb-8 leading-relaxed"><span className="text-gold ml-2">{i+1}.</span> {q.q}</h4>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        {q.options.map((opt, oi) => (
                                            <button key={oi} onClick={() => { const na = [...examAnswers]; na[i] = opt; setExamAnswers(na); }} className={`p-6 rounded-2xl text-right font-bold transition-all border-2 text-lg ${ examAnswers[i] === opt ? 'bg-navy text-white border-navy scale-105 shadow-xl' : 'bg-cream border-transparent hover:border-gold' }`}>{opt}</button>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                        <button disabled={!isReady} onClick={submitFinal} className={`w-full mt-20 py-8 rounded-[2rem] font-black text-4xl shadow-2xl transition-all ${isReady ? 'bg-green-600 text-white hover:bg-navy' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}>إرسال النتيجة فوراً</button>
                    </div>
                );
            };

            // --- Result Screen ---
            const ResultScreen = () => {
                const grade = examAnswers.reduce((acc, curr, idx) => curr === finalQuestions[idx].a ? acc + 1 : acc, 0);
                const time = Math.floor((new Date() - user.startTime) / 60000);
                return (
                    <div className="max-w-2xl mx-auto mt-20 p-16 bg-white rounded-[4rem] shadow-2xl text-center fade-in border border-gold/20 relative">
                        <div className="absolute top-0 inset-x-0 h-4 bg-navy"></div>
                        <svg className="w-24 h-24 mx-auto text-green-500 mb-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        <h2 className="text-5xl font-amiri font-bold text-navy mb-4">تهانينا! تم الإرسال</h2>
                        <p className="text-2xl text-gray-500 mb-10">الطالب: {user.name}</p>
                        <div className="bg-navy p-12 rounded-[3rem] text-gold border-4 border-gold shadow-2xl">
                            <span className="text-sm opacity-60 uppercase block mb-2 tracking-widest">الدرجة النهائية</span>
                            <span className="text-9xl font-black tracking-tighter">{grade}</span>
                            <span className="text-4xl font-bold opacity-60"> / 20</span>
                        </div>
                        <div className="mt-12 text-gray-400 font-bold">الوقت المستغرق: {time} دقيقة</div>
                        <button onClick={() => window.location.reload()} className="mt-12 text-navy underline font-black hover:text-gold transition-colors">خروج وإغلاق</button>
                    </div>
                );
            };

            return (
                <div className="min-h-screen transition-all duration-700">
                    <Banner />
                    <Modal />
                    <div className="container mx-auto px-4">
                        {screen === 'welcome' && <WelcomeScreen />}
                        {screen === 'topics' && <TopicFlow />}
                        {screen === 'review' && <ReviewScreen />}
                        {screen === 'exam' && <ExamScreen />}
                        {screen === 'result' && <ResultScreen />}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
